<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滙智 10 週年 - 主持人控場台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { gold: { 100: '#ffedc6', 300: '#ffc24a', 400: '#ffaa1d', 500: '#f98c00', 700: '#bb5200' }, midnight: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' } } } } }
    </script>
    <style>
        .text-gold-gradient {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-gold-100 to-gold-500;
        }

        .tab-btn {
            @apply px-6 py-3 font-bold text-lg rounded-t-xl transition bg-midnight-900 text-gold-500/50 hover:text-gold-300;
        }

        .tab-active {
            @apply bg-midnight-800 text-gold-300 border-t-4 border-gold-400;
        }

        @keyframes revealRow {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal-row {
            animation: revealRow 0.35s ease-out forwards;
            opacity: 0;
        }
    </style>
</head>

<body class="bg-midnight-950 text-gold-100 font-sans min-h-screen p-8">

    <!-- 登入畫面 -->
    <div id="login-screen" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-midnight-900/80 border border-gold-700/50 rounded-3xl p-10 shadow-2xl w-full max-w-md space-y-6">
            <div class="text-center">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-20 mx-auto drop-shadow-md mb-4">
                <h1 class="text-3xl font-black text-gold-gradient">管理員登入</h1>
                <p class="text-gold-400/70 mt-1">請輸入帳號密碼以進入控場台</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-gold-300 font-bold mb-1">帳號</label>
                    <input id="login-username" type="text" placeholder="請輸入帳號"
                        class="w-full bg-midnight-800 text-gold-200 p-4 rounded-xl outline-none font-bold border border-gold-700/50 focus:border-gold-400 transition">
                </div>
                <div>
                    <label class="block text-gold-300 font-bold mb-1">密碼</label>
                    <input id="login-password" type="password" placeholder="請輸入密碼"
                        class="w-full bg-midnight-800 text-gold-200 p-4 rounded-xl outline-none font-bold border border-gold-700/50 focus:border-gold-400 transition"
                        onkeydown="if(event.key==='Enter')doLogin()">
                </div>
                <p id="login-error" class="text-red-400 font-bold text-center hidden">帳號或密碼錯誤</p>
                <button onclick="doLogin()"
                    class="w-full bg-gradient-to-r from-gold-500 to-gold-700 hover:from-gold-400 hover:to-gold-600 text-midnight-950 px-8 py-4 rounded-xl font-black text-xl transition shadow-lg">
                    登入
                </button>
            </div>
        </div>
    </div>

    <!-- 管理介面（登入後顯示） -->
    <div id="admin-panel" class="hidden max-w-7xl mx-auto space-y-8">
        <header
            class="bg-midnight-900/80 border border-gold-700/50 rounded-3xl p-6 shadow-2xl flex justify-between items-center">
            <div class="flex items-center space-x-6">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-20 drop-shadow-md">
                <div>
                    <h1 class="text-3xl font-black text-gold-gradient">中央控場台</h1>
                    <p class="text-gold-400/70">狀態：<span id="current-state-label"
                            class="text-slate-400 font-bold">讀取中...</span></p>
                    <p class="text-gold-400/70">已加入玩家：<span id="header-player-count"
                            class="text-emerald-400 font-bold text-lg">0</span> 人</p>
                </div>
            </div>

            <div id="control-panel"
                class="flex items-center space-x-4 bg-midnight-950 p-3 rounded-2xl border border-gold-800/50">
                <select id="q-selector"
                    class="bg-midnight-800 text-gold-200 p-4 rounded-xl outline-none font-bold text-xl border border-gold-700/50 cursor-pointer w-64">
                    <option value="">載入題目中...</option>
                </select>

                <!-- waiting 狀態：開放作答 -->
                <button id="btn-start" onclick="changeState('playing')"
                    class="bg-gradient-to-r from-emerald-600 to-emerald-800 hover:from-emerald-500 text-white px-8 py-4 rounded-xl font-bold text-xl transition shadow-lg border border-emerald-400/50">
                    ▶️ 開放作答
                </button>

                <!-- playing 狀態：停止作答 -->
                <button id="btn-stop" onclick="changeState('stopped')"
                    class="hidden bg-gradient-to-r from-amber-600 to-amber-800 hover:from-amber-500 text-white px-8 py-4 rounded-xl font-bold text-xl transition shadow-lg border border-amber-400/50">
                    ⏸️ 停止作答
                </button>

                <!-- stopped 狀態：結算 -->
                <button id="btn-score" onclick="doScoring()"
                    class="hidden bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-500 text-white px-8 py-4 rounded-xl font-bold text-xl transition shadow-lg border border-blue-400/50">
                    💰 結算
                </button>

                <!-- scoring 狀態：下一題 + 結束遊戲 -->
                <button id="btn-next" onclick="nextQuestion()"
                    class="hidden bg-gradient-to-r from-emerald-600 to-emerald-800 hover:from-emerald-500 text-white px-8 py-4 rounded-xl font-bold text-xl transition shadow-lg border border-emerald-400/50">
                    ➡️ 下一題
                </button>
                <button id="btn-end" onclick="changeState('ended')"
                    class="hidden bg-red-800 hover:bg-red-700 text-white px-6 py-4 rounded-xl font-bold text-lg transition">
                    🏆 結束遊戲
                </button>
            </div>
        </header>

        <div class="flex space-x-2 border-b border-gold-800/50">
            <button onclick="switchTab('tab-stats')" id="btn-tab-stats" class="tab-btn tab-active">📊 作答監控</button>
            <button onclick="switchTab('tab-leaderboard')" id="btn-tab-leaderboard" class="tab-btn">🏆 總積分排行榜</button>
            <button onclick="switchTab('tab-history')" id="btn-tab-history" class="tab-btn">📝 答題紀錄</button>
            <div class="ml-auto flex space-x-3">
                <button onclick="resetAll()"
                    class="px-6 py-3 font-bold text-lg rounded-xl bg-red-900/80 text-red-200 hover:bg-red-800 border border-red-600/50 transition">
                    🔄 重置所有答題
                </button>
                <button onclick="showQRCode()"
                    class="px-6 py-3 font-bold text-lg rounded-xl bg-gold-700/80 text-gold-100 hover:bg-gold-600 border border-gold-500/50 transition">
                    📱 QR Code
                </button>
            </div>
        </div>

        <main
            class="bg-midnight-800/50 rounded-b-3xl rounded-tr-3xl border border-gold-700/30 shadow-2xl p-8 min-h-[500px]">

            <div id="tab-stats" class="space-y-6">
                <h2 id="stats-q-text" class="text-3xl font-bold text-gold-100 mb-4">請從上方選擇題目...</h2>

                <!-- 題目選項（點選設定正確答案） -->
                <div id="q-options-display" class="bg-midnight-900/60 p-6 rounded-2xl border border-gold-700/30 hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div onclick="selectCorrectAnswer(1)" id="opt-card-a"
                            class="flex items-center justify-between cursor-pointer bg-blue-900/20 border-2 border-blue-500/30 px-4 py-3 rounded-xl transition-all hover:border-emerald-400">
                            <div class="flex items-start space-x-3">
                                <span class="text-blue-300 font-black text-lg shrink-0">A.</span>
                                <span id="opt-text-a" class="text-blue-100 font-bold text-lg">—</span>
                            </div>
                            <span id="opt-count-a" class="text-blue-200 font-black text-2xl ml-3">0</span>
                        </div>
                        <div onclick="selectCorrectAnswer(2)" id="opt-card-b"
                            class="flex items-center justify-between cursor-pointer bg-indigo-900/20 border-2 border-indigo-500/30 px-4 py-3 rounded-xl transition-all hover:border-emerald-400">
                            <div class="flex items-start space-x-3">
                                <span class="text-indigo-300 font-black text-lg shrink-0">B.</span>
                                <span id="opt-text-b" class="text-indigo-100 font-bold text-lg">—</span>
                            </div>
                            <span id="opt-count-b" class="text-indigo-200 font-black text-2xl ml-3">0</span>
                        </div>
                        <div onclick="selectCorrectAnswer(3)" id="opt-card-c"
                            class="flex items-center justify-between cursor-pointer bg-sky-900/20 border-2 border-sky-500/30 px-4 py-3 rounded-xl transition-all hover:border-emerald-400">
                            <div class="flex items-start space-x-3">
                                <span class="text-sky-300 font-black text-lg shrink-0">C.</span>
                                <span id="opt-text-c" class="text-sky-100 font-bold text-lg">—</span>
                            </div>
                            <span id="opt-count-c" class="text-sky-200 font-black text-2xl ml-3">0</span>
                        </div>
                        <div onclick="selectCorrectAnswer(4)" id="opt-card-d"
                            class="flex items-center justify-between cursor-pointer bg-cyan-900/20 border-2 border-cyan-500/30 px-4 py-3 rounded-xl transition-all hover:border-emerald-400">
                            <div class="flex items-start space-x-3">
                                <span class="text-cyan-300 font-black text-lg shrink-0">D.</span>
                                <span id="opt-text-d" class="text-cyan-100 font-bold text-lg">—</span>
                            </div>
                            <span id="opt-count-d" class="text-cyan-200 font-black text-2xl ml-3">0</span>
                        </div>
                    </div>
                </div>

                <!-- 提交狀況 -->
                <div class="bg-midnight-900/60 p-6 rounded-2xl border border-gold-700/30">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-2xl font-bold text-gold-200">📋 提交狀況</h3>
                        <span class="text-3xl font-black text-gold-gradient"><span id="submitted-count">0</span> / <span
                                id="total-count">0</span> 人</span>
                    </div>
                    <div class="w-full bg-midnight-950 rounded-full h-4 overflow-hidden">
                        <div id="submit-progress-bar"
                            class="bg-gradient-to-r from-gold-500 to-gold-700 h-4 rounded-full transition-all duration-500"
                            style="width: 0%"></div>
                    </div>
                </div>

                <!-- 各玩家提交狀態 -->
                <div class="bg-midnight-900/60 p-6 rounded-2xl border border-gold-700/30">
                    <h3 class="text-xl font-bold text-gold-200 mb-4">👥 各玩家提交狀態</h3>
                    <div id="player-status-list" class="space-y-2 max-h-[500px] overflow-y-auto">
                        <div class="text-gold-400/50 text-center py-4">等待作答開始...</div>
                    </div>
                </div>


                <div class="text-center mt-6">
                    <button onclick="fetchCurrentQuestionStats()" class="text-gold-400 hover:text-gold-200 underline">🔄
                        手動刷新統計資料</button>
                </div>
            </div>

            <div id="tab-leaderboard" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold text-gold-100">榮耀排行榜</h2>
                    <p class="text-gold-400/80">參賽總人數: <span id="total-players"
                            class="font-bold text-2xl text-gold-200">0</span></p>
                </div>
                <div
                    class="bg-midnight-900/80 px-8 py-4 border-b border-gold-700/30 grid grid-cols-12 gap-4 text-gold-400/80 font-bold uppercase text-sm rounded-t-2xl">
                    <div class="col-span-2 text-center">排名</div>
                    <div class="col-span-6">玩家</div>
                    <div class="col-span-4 text-right">積分</div>
                </div>
                <div id="leaderboard-container" class="space-y-2 mt-2"></div>
            </div>

            <div id="tab-history" class="hidden">
                <h2 class="text-3xl font-bold text-gold-100 mb-6">答題紀錄</h2>
                <div id="history-container" class="space-y-4">
                    <div class="text-gold-400/50 text-center py-10">載入中...</div>
                </div>
            </div>

        </main>
    </div><!-- /admin-panel -->

    <!-- QR Code Modal -->
    <div id="qr-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center"
        onclick="if(event.target===this)closeQRCode()">
        <div
            class="bg-midnight-900 border-2 border-gold-600/50 rounded-3xl p-10 text-center space-y-6 shadow-2xl max-w-md">
            <h2 class="text-3xl font-black text-gold-gradient">掃描加入遊戲</h2>
            <div class="bg-white p-4 rounded-2xl inline-block">
                <img id="qr-img" src="" alt="QR Code" class="w-64 h-64">
            </div>
            <p id="qr-url" class="text-gold-300 text-lg font-mono break-all"></p>
            <button onclick="closeQRCode()"
                class="px-8 py-3 bg-gold-700 hover:bg-gold-600 text-midnight-950 font-bold rounded-xl text-lg transition">關閉</button>
        </div>
    </div>

    <script>
        function showQRCode() {
            const playerUrl = window.location.origin + '/';
            const qrApiUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=' + encodeURIComponent(playerUrl);
            document.getElementById('qr-img').src = qrApiUrl;
            document.getElementById('qr-url').innerText = playerUrl;
            document.getElementById('qr-modal').classList.remove('hidden');
        }
        function closeQRCode() {
            document.getElementById('qr-modal').classList.add('hidden');
        }
    </script>

    <script>
        const SUPABASE_URL = "https://jwwhkbxgcbasmgkgmrvl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3d2hrYnhnY2Jhc21na2dtcnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEzODYsImV4cCI6MjA4ODI0NzM4Nn0.B_9hBrm8aUO6lGmyCCyBdSU49Xv2EPLGOnjet1Lf8jE";
        const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let questions = [];
        let selectedAnswer = 0;
        let statsInterval = null;
        let adminChannel = null;

        async function initAdmin() {
            // 自動檢查並初始化 game_status 控制資料
            try {
                const { data: checkData } = await sbClient.from('game_status').select('id').eq('id', 1).maybeSingle();
                if (!checkData) {
                    console.log("資料庫無控制資料，正在自動建立...");
                    const { error: insertErr } = await sbClient.from('game_status').insert([{ id: 1, current_q_id: 1, state: 'waiting', start_time: 0 }]);
                    if (insertErr) {
                        console.error("自動建立失敗，可能是權限不足：", insertErr);
                        alert("請至 Supabase -> SQL Editor 手動執行以下指令來初始化資料：\n\ninsert into public.game_status (id, current_q_id, state, start_time) values (1, 1, 'waiting', 0);");
                    }
                }
                updateControlButtons('waiting');
            } catch (err) {
                console.error("初始化檢查失敗", err);
            }

            // 載入題庫到下拉選單
            const { data: qData } = await sbClient.from('questions').select('*').order('id', { ascending: true });
            questions = qData;
            const select = document.getElementById('q-selector');
            select.innerHTML = '';

            if (!questions || questions.length === 0) {
                select.innerHTML = '<option value="">(無題目資料)</option>';
            } else {
                questions.forEach((q, idx) => {
                    select.innerHTML += `<option value="${q.id}">Q${idx + 1}: ${q.question}</option>`;
                });
            }

            // 監聽下拉選單改變，自動讀取該題統計並設定預設正確答案
            select.addEventListener('change', () => {
                const qId = select.value;
                if (!qId) return;
                const q = questions.find(x => x.id == qId);
                const qIdx = questions.findIndex(x => x.id == qId);
                document.getElementById('stats-q-text').innerText = `Q${qIdx + 1}: ${q.question}`;
                // 顯示選項內容
                document.getElementById('opt-text-a').innerText = q.option_a || '—';
                document.getElementById('opt-text-b').innerText = q.option_b || '—';
                document.getElementById('opt-text-c').innerText = q.option_c || '—';
                document.getElementById('opt-text-d').innerText = q.option_d || '—';
                document.getElementById('q-options-display').classList.remove('hidden');
                selectedAnswer = 0;
                highlightSelectedAnswer(0);
                fetchCurrentQuestionStats();
            });

            if (questions && questions.length > 0) {
                select.dispatchEvent(new Event('change'));
            }

            // 開始定時更新排行榜 & 統計資料 & 玩家列表
            fetchLeaderboard();
            fetchPlayerList();
            setInterval(fetchLeaderboard, 3000);
            setInterval(fetchPlayerList, 2000);
            startStatsPolling();

            // 即時訂閱：玩家提交答案、新玩家加入、分數更新時立刻刷新
            adminChannel = sbClient.channel('admin-realtime')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'responses'
                }, () => {
                    fetchCurrentQuestionStats();
                })
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'players'
                }, () => {
                    fetchPlayerList();
                    fetchCurrentQuestionStats();
                    fetchLeaderboard();
                })
                .subscribe((status) => {
                    console.log("Admin 即時訂閱狀態:", status);
                });
        }

        let currentState = 'waiting';

        function updateControlButtons(state) {
            currentState = state;
            const ids = ['btn-start', 'btn-stop', 'btn-score', 'btn-next', 'btn-end'];
            ids.forEach(id => document.getElementById(id).classList.add('hidden'));

            const selector = document.getElementById('q-selector');

            if (state === 'waiting') {
                selector.disabled = false;
                document.getElementById('btn-start').classList.remove('hidden');
            } else if (state === 'playing') {
                selector.disabled = true;
                document.getElementById('btn-stop').classList.remove('hidden');
            } else if (state === 'stopped') {
                selector.disabled = true;
                document.getElementById('btn-score').classList.remove('hidden');
            } else if (state === 'scoring') {
                selector.disabled = true;
                document.getElementById('btn-next').classList.remove('hidden');
                document.getElementById('btn-end').classList.remove('hidden');
            } else if (state === 'ended') {
                selector.disabled = true;
            }

            // 更新狀態顯示
            const label = document.getElementById('current-state-label');
            const labels = {
                waiting: ['⏸️ 待機中 (Waiting)', 'text-slate-400 font-bold'],
                playing: ['🟢 開放作答中 (Playing)', 'text-emerald-400 font-bold'],
                stopped: ['🔴 已停止作答 (Stopped)', 'text-amber-400 font-bold'],
                scoring: ['💰 結算中 (Scoring)', 'text-blue-400 font-bold'],
                ended: ['🏆 遊戲結束 (Ended)', 'text-gold-400 font-bold']
            };
            const [text, cls] = labels[state] || ['未知', 'text-slate-400 font-bold'];
            label.innerText = text;
            label.className = cls;
        }

        function startStatsPolling() {
            if (statsInterval) return;
            fetchCurrentQuestionStats();
            statsInterval = setInterval(fetchCurrentQuestionStats, 2000);
        }

        function stopStatsPolling() {
            if (statsInterval) { clearInterval(statsInterval); statsInterval = null; }
        }

        // 發送指令給所有手機 (更新 game_status)
        async function changeState(newState) {
            const selectEl = document.getElementById('q-selector');
            const qId = selectEl.value;

            if (!qId) {
                alert("題庫尚未載入，無法開放作答！請確認有匯入題目。");
                return;
            }

            const updateData = {
                current_q_id: parseInt(qId),
                state: newState,
                start_time: Date.now()
            };

            const { data, error } = await sbClient.from('game_status').update(updateData).eq('id', 1).select();

            if (error) {
                alert(`狀態切換失敗！發生錯誤：${error.message}`);
                console.error(error);
            } else if (!data || data.length === 0) {
                alert("切換失敗！找不到初始化資料 (id=1)，請重新整理網頁讓系統自動建立。");
            } else {
                updateControlButtons(newState);

                // stopped 時自動刷新統計
                if (newState === 'stopped') {
                    fetchCurrentQuestionStats();
                    switchTab('tab-stats');
                }
                // scoring 時自動切到排行榜
                if (newState === 'scoring') {
                    fetchLeaderboard();
                    switchTab('tab-leaderboard');
                }
            }
        }

        // 正確答案選擇
        function selectCorrectAnswer(choice) {
            if (selectedAnswer === choice) {
                selectedAnswer = null;
                highlightSelectedAnswer(null);
            } else {
                selectedAnswer = choice;
                highlightSelectedAnswer(choice);
            }
        }

        function highlightSelectedAnswer(choice) {
            const cards = ['a', 'b', 'c', 'd'];
            const defaultStyles = [
                'flex items-center justify-between cursor-pointer bg-blue-900/20 border-2 border-blue-500/30 px-4 py-3 rounded-xl transition-all hover:border-emerald-400',
                'flex items-center justify-between cursor-pointer bg-indigo-900/20 border-2 border-indigo-500/30 px-4 py-3 rounded-xl transition-all hover:border-emerald-400',
                'flex items-center justify-between cursor-pointer bg-sky-900/20 border-2 border-sky-500/30 px-4 py-3 rounded-xl transition-all hover:border-emerald-400',
                'flex items-center justify-between cursor-pointer bg-cyan-900/20 border-2 border-cyan-500/30 px-4 py-3 rounded-xl transition-all hover:border-emerald-400'
            ];
            const selectedStyle = 'flex items-center justify-between cursor-pointer bg-emerald-900/30 border-2 border-emerald-400 ring-4 ring-emerald-400/50 px-4 py-3 rounded-xl transition-all';
            for (let i = 0; i < 4; i++) {
                const card = document.getElementById('opt-card-' + cards[i]);
                card.className = (i + 1 === choice) ? selectedStyle : defaultStyles[i];
            }
        }

        // 結算：根據選擇的正確答案計算分數
        async function doScoring() {
            const qId = parseInt(document.getElementById('q-selector').value);
            if (!qId) return alert("請選擇題目");

            const q = questions.find(x => x.id === qId);

            // 若 admin 未手動選擇正確答案，則使用資料庫中的預設答案
            if (!selectedAnswer) {
                if (q && q.answer) {
                    selectedAnswer = q.answer;
                    highlightSelectedAnswer(selectedAnswer);
                } else {
                    alert("請先選擇正確答案！（此題資料庫中也無預設答案）");
                    return;
                }
            }
            const points = q ? (q.points || 1000) : 1000;

            // 取得此題所有作答
            const { data: responses, error: rErr } = await sbClient.from('responses').select('*').eq('question_id', qId);
            if (rErr) return alert("無法讀取作答資料：" + rErr.message);

            // 計算並更新分數（含時間加成）
            let correctCount = 0;
            for (const r of (responses || [])) {
                const isCorrect = (r.choice === selectedAnswer && r.choice !== 0);
                if (isCorrect) correctCount++;

                // 更新 response 的 is_correct
                await sbClient.from('responses').update({ is_correct: isCorrect }).eq('id', r.id);

                // 答對的加分（依答題速度加成）
                if (isCorrect) {
                    const remainingMs = Math.max(0, 15000 - (r.response_time_ms || 15000));
                    const score = Math.round(points * (1 + (remainingMs / 15000) * 0.75));

                    const { data: player } = await sbClient.from('players').select('score').eq('name', r.player_name).single();
                    if (player) {
                        await sbClient.from('players').update({ score: player.score + score }).eq('name', r.player_name);
                    }
                }
            }

            // 如果 admin 改了答案，同步更新題庫
            if (q && selectedAnswer !== q.answer) {
                await sbClient.from('questions').update({ answer: selectedAnswer }).eq('id', qId);
                q.answer = selectedAnswer;
            }

            console.log(`結算完成: ${correctCount} 人答對，每人 +${points} 分`);

            // 切換到 scoring 狀態
            changeState('scoring');
        }

        // 下一題：自動選擇下一題，切回 waiting
        async function nextQuestion() {
            const selectEl = document.getElementById('q-selector');
            const currentIdx = selectEl.selectedIndex;
            if (currentIdx < selectEl.options.length - 1) {
                selectEl.selectedIndex = currentIdx + 1;
                selectEl.dispatchEvent(new Event('change'));
            }
            // 切回 waiting
            const qId = selectEl.value;
            const { data, error } = await sbClient.from('game_status').update({
                current_q_id: parseInt(qId),
                state: 'waiting',
                start_time: 0
            }).eq('id', 1).select();

            if (!error && data && data.length > 0) {
                updateControlButtons('waiting');
            }
        }

        // 讀取當前題目的作答統計 + 提交狀況
        async function fetchCurrentQuestionStats() {
            const qId = document.getElementById('q-selector').value;
            if (!qId) return;

            // 取得作答資料
            const { data: responses } = await sbClient.from('responses').select('player_name, choice').eq('question_id', qId);

            // 取得總玩家數
            const { count: totalPlayers } = await sbClient.from('players').select('*', { count: 'exact', head: true });

            let counts = { 1: 0, 2: 0, 3: 0, 4: 0, 0: 0 };
            const respondedNames = new Set();

            if (responses) {
                responses.forEach(r => {
                    if (counts[r.choice] !== undefined) counts[r.choice]++;
                    respondedNames.add(r.player_name);
                });
            }

            document.getElementById('opt-count-a').innerText = counts[1];
            document.getElementById('opt-count-b').innerText = counts[2];
            document.getElementById('opt-count-c').innerText = counts[3];
            document.getElementById('opt-count-d').innerText = counts[4];

            // 更新提交進度
            const submittedCount = respondedNames.size;
            const total = totalPlayers || 0;
            document.getElementById('submitted-count').innerText = submittedCount;
            document.getElementById('total-count').innerText = total;
            const pct = total > 0 ? Math.round((submittedCount / total) * 100) : 0;
            document.getElementById('submit-progress-bar').style.width = pct + '%';

            // 更新各玩家提交狀態
            const choiceMap = {};
            if (responses) {
                responses.forEach(r => { choiceMap[r.player_name] = r.choice; });
            }
            const choiceLabels = { 1: 'A', 2: 'B', 3: 'C', 4: 'D', 0: '未答' };
            const choiceColors = {
                1: 'text-blue-300 bg-blue-900/40',
                2: 'text-indigo-300 bg-indigo-900/40',
                3: 'text-sky-300 bg-sky-900/40',
                4: 'text-cyan-300 bg-cyan-900/40',
                0: 'text-red-400 bg-red-900/40'
            };

            const { data: allPlayers } = await sbClient.from('players').select('name').order('name');
            if (allPlayers) {
                renderPlayerStatusList(allPlayers, respondedNames, choiceMap, choiceLabels, choiceColors);
            }
        }

        // 獨立的玩家列表刷新（不依賴題目選擇）
        async function fetchPlayerList() {
            try {
                const { data: allPlayers, count } = await sbClient.from('players').select('*', { count: 'exact' }).order('name');
                const total = count || 0;
                document.getElementById('header-player-count').innerText = total;
                document.getElementById('total-count').innerText = total;

                if (allPlayers && allPlayers.length > 0) {
                    const qId = document.getElementById('q-selector').value;
                    let respondedNames = new Set();
                    const choiceMap = {};
                    if (qId) {
                        const { data: responses } = await sbClient.from('responses').select('player_name, choice').eq('question_id', qId);
                        if (responses) responses.forEach(r => {
                            respondedNames.add(r.player_name);
                            choiceMap[r.player_name] = r.choice;
                        });
                    }

                    const choiceLabels = { 1: 'A', 2: 'B', 3: 'C', 4: 'D', 0: '未答' };
                    const choiceColors = {
                        1: 'text-blue-300 bg-blue-900/40',
                        2: 'text-indigo-300 bg-indigo-900/40',
                        3: 'text-sky-300 bg-sky-900/40',
                        4: 'text-cyan-300 bg-cyan-900/40',
                        0: 'text-red-400 bg-red-900/40'
                    };

                    renderPlayerStatusList(allPlayers, respondedNames, choiceMap, choiceLabels, choiceColors);
                } else {
                    document.getElementById('player-status-list').innerHTML = '<div class="text-gold-400/50 text-center py-4">尚無玩家</div>';
                }
            } catch (err) {
                console.error('fetchPlayerList 錯誤:', err);
            }
        }

        // 讀取總排行榜
        async function fetchLeaderboard() {
            const { data: players, count } = await sbClient.from('players').select('*', { count: 'exact' }).order('score', { ascending: false });
            document.getElementById('total-players').innerText = count || 0;

            const container = document.getElementById('leaderboard-container');
            if (!players || players.length === 0) return container.innerHTML = '<div class="text-center py-10">尚無資料</div>';

            let html = '';
            players.forEach((p, i) => {
                const isTop3 = i < 3;
                const bg = isTop3 ? 'bg-gradient-to-r from-gold-500/20 to-gold-700/20 border border-gold-500/50' : 'bg-midnight-800/50 border border-gold-800/30';
                const crown = isTop3 ? ' 👑' : '';
                html += `<div class="grid grid-cols-12 gap-4 items-center px-8 py-4 rounded-xl ${bg}">
                            <div class="col-span-2 text-center font-bold text-xl">${i + 1}${crown}</div>
                            <div class="col-span-6 font-bold text-xl">${p.name}</div>
                            <div class="col-span-4 text-right font-mono font-black text-2xl text-gold-300">${p.score}</div>
                         </div>`;
            });
            container.innerHTML = html;
        }

        // 共用：渲染玩家提交狀態列表
        let lastRenderedState = '';
        function renderPlayerStatusList(allPlayers, respondedNames, choiceMap, choiceLabels, choiceColors) {
            const container = document.getElementById('player-status-list');
            const isStopped = (currentState === 'stopped' || currentState === 'scoring');

            // 在 stopped/scoring 狀態下使用排行榜樣式逐行展開
            if (isStopped) {
                const needsAnimation = (lastRenderedState !== 'stopped' && lastRenderedState !== 'scoring');
                lastRenderedState = currentState;

                let html = '';
                let idx = 0;
                allPlayers.forEach(p => {
                    const submitted = respondedNames.has(p.name);
                    const choice = choiceMap[p.name];
                    const choiceLabel = choiceLabels[choice] || '?';
                    const choiceColor = choiceColors[choice] || 'text-gold-400';

                    const delay = needsAnimation ? `animation-delay: ${idx * 80}ms;` : '';
                    const animClass = needsAnimation ? 'reveal-row' : '';

                    let statusBadge;
                    if (submitted && choice !== 0) {
                        statusBadge = `<span class="${choiceColor} font-black text-xl px-3 py-1 rounded-lg">${choiceLabel}</span>`;
                    } else if (submitted) {
                        statusBadge = `<span class="text-red-400 bg-red-900/40 font-black text-xl px-3 py-1 rounded-lg">未答</span>`;
                    } else {
                        statusBadge = `<span class="text-gold-400/50 font-bold px-3 py-1">未提交</span>`;
                    }

                    html += `<div class="grid grid-cols-12 gap-4 items-center px-6 py-3 rounded-xl bg-midnight-800/50 border border-gold-800/30 ${animClass}" style="${delay}">
                        <div class="col-span-1 text-center font-bold text-gold-400/60">${idx + 1}</div>
                        <div class="col-span-7 font-bold text-lg">${p.name}</div>
                        <div class="col-span-4 text-right">${statusBadge}</div>
                    </div>`;
                    idx++;
                });
                container.innerHTML = html || '<div class="text-gold-400/50 text-center py-4">尚無玩家</div>';
            } else {
                // playing / waiting 狀態：簡潔的提交狀態列表
                lastRenderedState = currentState;
                let html = '';
                allPlayers.forEach(p => {
                    const submitted = respondedNames.has(p.name);
                    let statusHtml;
                    if (submitted) {
                        statusHtml = `<span class="text-emerald-400 font-bold whitespace-nowrap">✓ 已提交</span>`;
                    } else {
                        statusHtml = `<span class="text-gold-400/50 font-bold whitespace-nowrap">⏳ 等待中</span>`;
                    }
                    html += `<div class="grid grid-cols-12 gap-4 items-center px-6 py-3 rounded-xl ${submitted ? 'bg-emerald-900/30 border border-emerald-700/50' : 'bg-midnight-900/50 border border-gold-800/30'}">
                        <div class="col-span-8 font-bold text-lg">${p.name}</div>
                        <div class="col-span-4 text-right">${statusHtml}</div>
                    </div>`;
                });
                container.innerHTML = html || '<div class="text-gold-400/50 text-center py-4">尚無玩家</div>';
            }
        }

        // 答題紀錄：載入所有已作答題目的每人答案
        async function fetchHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = '<div class="text-gold-400/50 text-center py-10">載入中...</div>';

            // 取得所有有作答紀錄的 responses（含 is_correct）
            const { data: allResponses } = await sbClient.from('responses').select('*').order('question_id', { ascending: true });
            if (!allResponses || allResponses.length === 0) {
                container.innerHTML = '<div class="text-gold-400/50 text-center py-10">尚無答題紀錄</div>';
                return;
            }

            // 按題目分組
            const grouped = {};
            allResponses.forEach(r => {
                if (!grouped[r.question_id]) grouped[r.question_id] = [];
                grouped[r.question_id].push(r);
            });

            const choiceLabels = { 1: 'A', 2: 'B', 3: 'C', 4: 'D', 0: '未答' };

            let html = '';
            for (const qId of Object.keys(grouped)) {
                const q = questions.find(x => x.id == qId);
                const qIdx = questions.findIndex(x => x.id == qId);
                const qLabel = q ? `Q${qIdx + 1}: ${q.question}` : `題目 #${qId}`;
                const correctAnswer = q ? q.answer : null;
                const responses = grouped[qId];

                // 判斷是否已結算（is_correct 從 null 變為 true/false 即為已結算）
                const hasScored = responses.some(r => r.is_correct !== null);

                const correctCount = responses.filter(r => r.is_correct).length;
                const totalCount = responses.length;

                const correctLabel = choiceLabels[correctAnswer] || '?';
                const correctOptionText = q ? (q[`option_${correctLabel.toLowerCase()}`] || '') : '';
                const correctDisplay = correctOptionText ? `${correctLabel}. ${correctOptionText}` : correctLabel;

                const headerInfo = hasScored
                    ? `正確答案：<span class="text-emerald-400 font-bold">${correctDisplay}</span>　答對：<span class="text-emerald-400 font-bold">${correctCount}</span> / ${totalCount} 人`
                    : `<span class="text-yellow-400">尚未結算</span>　已作答：${totalCount} 人`;

                html += `<div class="bg-midnight-900/60 rounded-2xl border border-gold-700/30 overflow-hidden">
                    <div class="px-6 py-4 bg-midnight-900/80 border-b border-gold-700/30 cursor-pointer flex justify-between items-center" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <div>
                            <h3 class="text-xl font-bold text-gold-200">${qLabel}</h3>
                            <p class="text-sm text-gold-400/60 mt-1">${headerInfo}</p>
                        </div>
                        <span class="text-gold-400/50 text-2xl">▼</span>
                    </div>
                    <div class="hidden">
                        <div class="px-6 py-3 grid grid-cols-12 gap-4 text-gold-400/60 font-bold text-sm border-b border-gold-800/30">
                            <div class="col-span-1">#</div>
                            <div class="${hasScored ? 'col-span-5' : 'col-span-8'}">玩家</div>
                            <div class="col-span-3 text-center">答案</div>
                            ${hasScored ? '<div class="col-span-3 text-center">結果</div>' : ''}
                        </div>
                        <div class="divide-y divide-gold-800/20">`;

                responses.sort((a, b) => a.player_name.localeCompare(b.player_name));
                responses.forEach((r, i) => {
                    const choiceLabel = choiceLabels[r.choice] || '?';
                    const isCorrect = r.is_correct;
                    const optionText = q ? (q[`option_${choiceLabel.toLowerCase()}`] || choiceLabel) : choiceLabel;
                    const resultBadge = isCorrect
                        ? '<span class="text-emerald-400 font-bold">✓ 答對</span>'
                        : '<span class="text-red-400 font-bold">✗ 答錯</span>';
                    const choiceDisplay = r.choice === 0
                        ? '<span class="text-red-400">未答</span>'
                        : `<span class="font-bold">${choiceLabel}. ${optionText}</span>`;

                    html += `<div class="px-6 py-3 grid grid-cols-12 gap-4 items-center ${hasScored && isCorrect ? 'bg-emerald-900/10' : ''}">
                            <div class="col-span-1 text-gold-400/50">${i + 1}</div>
                            <div class="${hasScored ? 'col-span-5' : 'col-span-8'} font-bold">${r.player_name}</div>
                            <div class="col-span-3 text-center text-sm">${choiceDisplay}</div>
                            ${hasScored ? `<div class="col-span-3 text-center">${resultBadge}</div>` : ''}
                        </div>`;
                });

                html += `</div></div></div>`;
            }

            container.innerHTML = html || '<div class="text-gold-400/50 text-center py-10">尚無答題紀錄</div>';
        }

        // 分頁切換邏輯
        function switchTab(tabId) {
            document.getElementById('tab-stats').classList.add('hidden');
            document.getElementById('tab-leaderboard').classList.add('hidden');
            document.getElementById('tab-history').classList.add('hidden');
            document.getElementById('btn-tab-stats').classList.remove('tab-active');
            document.getElementById('btn-tab-leaderboard').classList.remove('tab-active');
            document.getElementById('btn-tab-history').classList.remove('tab-active');

            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('tab-active');

            if (tabId === 'tab-history') fetchHistory();
        }

        // 重置所有答題狀況
        async function resetAll() {
            if (!confirm('確定要重置所有答題紀錄嗎？\n\n這將會：\n• 清除所有作答紀錄\n• 將所有玩家積分歸零\n• 遊戲狀態回到待機中\n\n此操作無法復原！')) return;

            try {
                // 清除所有作答紀錄
                await sbClient.from('responses').delete().neq('id', 0);

                // 將所有玩家積分歸零
                await sbClient.from('players').update({ score: 0 }).neq('id', 0);

                // 遊戲狀態回到 waiting，題目回到第一題
                await sbClient.from('game_status').update({
                    current_q_id: questions.length > 0 ? questions[0].id : 1,
                    state: 'waiting',
                    start_time: 0
                }).eq('id', 1);

                // 重設本地狀態
                const select = document.getElementById('q-selector');
                select.selectedIndex = 0;
                select.dispatchEvent(new Event('change'));
                updateControlButtons('waiting');
                fetchLeaderboard();

                alert('已成功重置所有答題紀錄！');
            } catch (err) {
                console.error('重置失敗', err);
                alert('重置失敗：' + err.message);
            }
        }

        // 登入驗證
        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            errorEl.classList.add('hidden');

            if (!username || !password) {
                errorEl.textContent = '請輸入帳號和密碼';
                errorEl.classList.remove('hidden');
                return;
            }

            const { data, error } = await sbClient.from('users')
                .select('id')
                .eq('username', username)
                .eq('password', password)
                .maybeSingle();

            if (error || !data) {
                errorEl.textContent = '帳號或密碼錯誤';
                errorEl.classList.remove('hidden');
                return;
            }

            // 登入成功：隱藏登入畫面，顯示管理介面
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            initAdmin();
        }
    </script>
</body>

</html>
