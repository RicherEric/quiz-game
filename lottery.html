<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滙智 10 週年 - 摸彩球抽獎</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/shared.css">
    <style>
        /* Ball animation */
        .ball {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 11px;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
            transition: none;
            user-select: none;
            pointer-events: none;
            box-shadow: inset -3px -3px 8px rgba(0, 0, 0, 0.3), inset 3px 3px 8px rgba(255, 255, 255, 0.2), 0 2px 8px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            text-align: center;
            line-height: 1.2;
            padding: 2px;
            word-break: break-all;
        }

        .ball.winner-ball {
            animation: pulse-glow 1s ease-in-out infinite;
            z-index: 10;
        }

        .ball.fade-out {
            opacity: 0;
            transition: opacity 0.8s ease-out;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(255, 170, 29, 0.6), inset -3px -3px 8px rgba(0, 0, 0, 0.3), inset 3px 3px 8px rgba(255, 255, 255, 0.2);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 0 35px rgba(255, 170, 29, 1), 0 0 60px rgba(255, 170, 29, 0.4), inset -3px -3px 8px rgba(0, 0, 0, 0.3), inset 3px 3px 8px rgba(255, 255, 255, 0.2);
                transform: scale(1.08);
            }
        }

        @keyframes winner-card-in {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .winner-card-anim {
            animation: winner-card-in 0.6s ease-out forwards;
        }

        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 170, 29, 0.3);
            border-radius: 3px;
        }
    </style>
</head>

<body class="bg-midnight-950 text-gold-100 font-sans min-h-screen overflow-hidden">
    <!-- 未登入提示 -->
    <div id="lottery-login-guard" class="hidden fixed inset-0 z-50 bg-midnight-950 flex items-center justify-center">

            <div class="space-y-2">

                    <div class="flex items-center space-x-1">

    <!-- Lottery Prize Modal -->
    <div id="lottery-prize-modal"

                <button onclick="closeLotteryPrizeModal()"

            </div>

    <script>
        const SUPABASE_URL = "https://fgklnzslrnmwmfuecnwu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZna2xuenNscm5td21mdWVjbnd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTI0MjAsImV4cCI6MjA5MDA2ODQyMH0.7IQ24I5u61Dcs9hh9XAnl0GXFHKj_gSa3z6POmQYVeQ";
        const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allGroups = [];
        let allMembers = [];
        let allPrizes = [];
        let allWinners = [];
        let isDrawing = false;
        let animationId = null;
        let drawMode = 'member'; // 'member' | 'group'
        let selectedGroupIds = new Set();

        // ===== Init =====
        async function initLottery() {
            await Promise.all([
                loadGroups(),
                loadPrizes(),
                loadWinners()
            ]);
            populatePrizeSelector();
            renderGroupSelector();
            updateEligibleCount();
            renderWinnerHistory();
        }

        async function loadGroups() {
            const { data: groups } = await sbClient.from('lottery_groups').select('*').order('id');
            const { data: members } = await sbClient.from('lottery_members').select('*').order('name');
            allGroups = groups || [];
            allMembers = members || [];
        }

        async function loadPrizes() {
            const { data } = await sbClient.from('lottery_prizes').select('*').order('sort_order').order('id');
            allPrizes = data || [];
        }

        async function loadWinners() {
            const { data, error } = await sbClient.from('lottery_winners').select('*, lottery_members(name, group_id), lottery_prizes(name, sort_order, winner_count)').order('drawn_at', { ascending: false });
            if (error) console.error('載入中獎紀錄失敗：', error);
            allWinners = data || [];
        }

        let prizeSelectorBound = false;
        function populatePrizeSelector() {
            const sel = document.getElementById('prize-selector');
            sel.innerHTML = '';
            if (allPrizes.length === 0) {
                sel.innerHTML = '<option value="">（尚無獎項）</option>';
                return;
            }
            allPrizes.forEach(p => {
                sel.innerHTML += `<option value="${p.id}">${p.name}（${p.winner_count} 名）</option>`;
            });
            if (!prizeSelectorBound) {
                sel.addEventListener('change', onPrizeChange);
                prizeSelectorBound = true;
            }
            sel.dispatchEvent(new Event('change'));
        }

        function onPrizeChange() {
            const prizeId = parseInt(document.getElementById('prize-selector').value);
            const prize = allPrizes.find(p => p.id === prizeId);
            document.getElementById('prize-winner-count').textContent = prize ? prize.winner_count : '-';
            updateEligibleCount();
            updatePrizeActionButtons();
        }

        function setDrawMode(mode) {
            drawMode = mode;
            document.getElementById('mode-member').className = mode === 'member'
                ? 'px-3 py-1 text-xs font-bold bg-gold-500 text-midnight-950 transition'
                : 'px-3 py-1 text-xs font-bold bg-midnight-800 text-gold-400 hover:text-gold-200 transition';
            document.getElementById('mode-group').className = mode === 'group'
                ? 'px-3 py-1 text-xs font-bold bg-gold-500 text-midnight-950 transition'
                : 'px-3 py-1 text-xs font-bold bg-midnight-800 text-gold-400 hover:text-gold-200 transition';
            document.getElementById('eligible-label').textContent = mode === 'member' ? '合格人數' : '合格群組數';
            updateEligibleCount();
        }

        function renderGroupSelector() {
            selectedGroupIds = new Set(allGroups.map(g => g.id));
            const panel = document.getElementById('group-selector-panel');
            panel.innerHTML = allGroups.map(g => {
                const count = allMembers.filter(m => m.group_id === g.id).length;
                return `<label class="flex items-center space-x-1.5 cursor-pointer py-0.5">
                    <input type="checkbox" class="w-4 h-4 accent-gold-500 group-cb" data-gid="${g.id}" checked>
                    <span class="text-gold-200 text-xs truncate">${g.name} (${count})</span>
                </label>`;
            }).join('');
            panel.querySelectorAll('.group-cb').forEach(cb => {
                cb.addEventListener('change', () => {
                    const gid = parseInt(cb.dataset.gid);
                    if (cb.checked) selectedGroupIds.add(gid); else selectedGroupIds.delete(gid);
                    updateToggleAllBtn();
                    updateEligibleCount();
                });
            });
            updateToggleAllBtn();
        }

        function toggleAllGroups() {
            const allSelected = selectedGroupIds.size === allGroups.length;
            const panel = document.getElementById('group-selector-panel');
            panel.querySelectorAll('.group-cb').forEach(cb => {
                cb.checked = !allSelected;
                const gid = parseInt(cb.dataset.gid);
                if (!allSelected) selectedGroupIds.add(gid); else selectedGroupIds.delete(gid);
            });
            updateToggleAllBtn();
            updateEligibleCount();
        }

        function updateToggleAllBtn() {
            const btn = document.getElementById('btn-toggle-all-groups');
            btn.textContent = selectedGroupIds.size === allGroups.length ? '取消全選' : '全選';
        }

        function getEligibleMembers(redrawPrizeId = null) {
            const allowRepeat = document.getElementById('allow-repeat').checked;
            let pool = allMembers.filter(m => selectedGroupIds.has(m.group_id));
            if (allowRepeat) return pool;
            // When redrawing a specific prize, only exclude winners from OTHER prizes
            const winnersToExclude = redrawPrizeId != null
                ? allWinners.filter(w => w.prize_id !== redrawPrizeId)
                : allWinners;
            const wonMemberIds = new Set(winnersToExclude.map(w => w.member_id));
            return pool.filter(m => !wonMemberIds.has(m.id));
        }

        function getEligibleGroups(redrawPrizeId = null) {
            const allowRepeat = document.getElementById('allow-repeat').checked;
            let pool = allGroups.filter(g => selectedGroupIds.has(g.id));
            if (allowRepeat) return pool;
            // When redrawing a specific prize, only exclude winners from OTHER prizes
            const winnersToExclude = redrawPrizeId != null
                ? allWinners.filter(w => w.prize_id !== redrawPrizeId)
                : allWinners;
            const wonGroupIds = new Set(winnersToExclude.filter(w => w.group_id != null).map(w => w.group_id));
            return pool.filter(g => !wonGroupIds.has(g.id));
        }

        function updateEligibleCount() {
            const prizeId = parseInt(document.getElementById('prize-selector').value);
            const prize = allPrizes.find(p => p.id === prizeId);
            // If the selected prize already has winners, they should be eligible for re-draw
            const hasExistingWinners = prize && allWinners.some(w => w.prize_id === prizeId);
            const redrawId = hasExistingWinners ? prizeId : null;
            const eligible = drawMode === 'member' ? getEligibleMembers(redrawId) : getEligibleGroups(redrawId);
            document.getElementById('eligible-count').textContent = eligible.length;
            const btn = document.getElementById('btn-draw');
            btn.disabled = !prize || eligible.length === 0 || isDrawing;
        }

        document.getElementById('allow-repeat').addEventListener('change', updateEligibleCount);

        // ===== Ball Colors =====
        const BALL_COLORS = [
            '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#1abc9c',
            '#3498db', '#9b59b6', '#e84393', '#00cec9', '#6c5ce7',
            '#fd79a8', '#00b894', '#fdcb6e', '#0984e3', '#d63031',
            '#a29bfe', '#55a3f2', '#ff7675', '#74b9ff', '#dfe6e9'
        ];

        function getBallColor(index) {
            return BALL_COLORS[index % BALL_COLORS.length];
        }

        // ===== Ball Physics =====
        class BallPhysics {
            constructor(container) {
                this.container = container;
                this.balls = [];
                this.running = false;
                this.friction = 1;
            }

            init(members) {
                this.clear();
                const rect = this.container.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;
                const ballSize = Math.max(36, Math.min(52, Math.floor(Math.min(w, h) / Math.sqrt(members.length + 1) * 0.8)));

                members.forEach((m, i) => {
                    const el = document.createElement('div');
                    el.className = 'ball';
                    el.style.width = ballSize + 'px';
                    el.style.height = ballSize + 'px';
                    el.style.background = `radial-gradient(circle at 35% 35%, ${getBallColor(i)}dd, ${getBallColor(i)}88)`;
                    el.style.fontSize = Math.max(9, ballSize * 0.22) + 'px';

                    // Show truncated name
                    const displayName = m.name.length > 4 ? m.name.slice(0, 4) : m.name;
                    el.textContent = displayName;
                    this.container.appendChild(el);

                    const x = Math.random() * (w - ballSize);
                    const y = Math.random() * (h - ballSize);
                    const speed = 2 + Math.random() * 4;
                    const angle = Math.random() * Math.PI * 2;

                    this.balls.push({
                        el, memberId: m.id, memberName: m.name,
                        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        size: ballSize
                    });
                });
            }

            start() {
                this.running = true;
                this.friction = 1;
                this.animate();
            }

            animate() {
                if (!this.running) return;
                const rect = this.container.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;

                for (const b of this.balls) {
                    b.x += b.vx * this.friction;
                    b.y += b.vy * this.friction;

                    // Wall bounce
                    if (b.x <= 0) { b.x = 0; b.vx = Math.abs(b.vx); }
                    if (b.x >= w - b.size) { b.x = w - b.size; b.vx = -Math.abs(b.vx); }
                    if (b.y <= 0) { b.y = 0; b.vy = Math.abs(b.vy); }
                    if (b.y >= h - b.size) { b.y = h - b.size; b.vy = -Math.abs(b.vy); }

                    b.el.style.left = b.x + 'px';
                    b.el.style.top = b.y + 'px';
                }

                // Simple ball-to-ball collision
                for (let i = 0; i < this.balls.length; i++) {
                    for (let j = i + 1; j < this.balls.length; j++) {
                        const a = this.balls[i], b = this.balls[j];
                        const dx = a.x - b.x, dy = a.y - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = (a.size + b.size) / 2;
                        if (dist < minDist && dist > 0) {
                            const nx = dx / dist, ny = dy / dist;
                            const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
                            const dvn = dvx * nx + dvy * ny;
                            if (dvn > 0) continue;
                            a.vx -= dvn * nx; a.vy -= dvn * ny;
                            b.vx += dvn * nx; b.vy += dvn * ny;
                            const overlap = (minDist - dist) / 2;
                            a.x += nx * overlap; a.y += ny * overlap;
                            b.x -= nx * overlap; b.y -= ny * overlap;
                        }
                    }
                }

                animationId = requestAnimationFrame(() => this.animate());
            }

            slowDown(duration, callback) {
                const startTime = performance.now();
                const decel = () => {
                    const elapsed = performance.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    this.friction = 1 - progress * 0.95; // slow to 5% speed
                    if (progress < 1) {
                        requestAnimationFrame(decel);
                    } else {
                        callback();
                    }
                };
                decel();
            }

            stop() {
                this.running = false;
                if (animationId) cancelAnimationFrame(animationId);
            }

            highlightWinners(winnerIds) {
                const rect = this.container.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;

                // Fade out non-winners
                this.balls.forEach(b => {
                    if (!winnerIds.includes(b.memberId)) {
                        b.el.classList.add('fade-out');
                    }
                });

                // After fade, center winners
                setTimeout(() => {
                    // Remove faded balls
                    this.balls.forEach(b => {
                        if (!winnerIds.includes(b.memberId)) {
                            b.el.remove();
                        }
                    });
                    this.balls = this.balls.filter(b => winnerIds.includes(b.memberId));

                    // Arrange winners in center
                    const count = this.balls.length;
                    const bigSize = Math.min(90, Math.floor(w / (count + 1)));
                    const totalWidth = count * (bigSize + 16);
                    const startX = (w - totalWidth) / 2;
                    const centerY = h / 2 - bigSize / 2;

                    this.balls.forEach((b, i) => {
                        b.el.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        b.el.style.width = bigSize + 'px';
                        b.el.style.height = bigSize + 'px';
                        b.el.style.fontSize = Math.max(12, bigSize * 0.18) + 'px';
                        b.el.style.left = (startX + i * (bigSize + 16)) + 'px';
                        b.el.style.top = centerY + 'px';
                        b.el.classList.add('winner-ball');
                        b.el.textContent = b.memberName;
                    });
                }, 900);
            }

            clear() {
                this.stop();
                this.balls.forEach(b => b.el.remove());
                this.balls = [];
            }
        }

        let physics = null;

        // ===== Weighted Random Draw =====
        function weightedRandomDraw(eligibleMembers, count) {
            const winners = [];
            let pool = [...eligibleMembers];

            for (let i = 0; i < count && pool.length > 0; i++) {
                // Build weights
                const groupMemberCounts = {};
                pool.forEach(m => {
                    groupMemberCounts[m.group_id] = (groupMemberCounts[m.group_id] || 0) + 1;
                });

                const weights = pool.map(m => {
                    const group = allGroups.find(g => g.id === m.group_id);
                    const prob = group ? group.probability_pct : 0;
                    const groupCount = groupMemberCounts[m.group_id] || 1;
                    return prob / groupCount;
                });

                const totalWeight = weights.reduce((s, w) => s + w, 0);
                if (totalWeight <= 0) {
                    // Fallback: equal probability
                    const idx = Math.floor(Math.random() * pool.length);
                    winners.push(pool[idx]);
                    pool.splice(idx, 1);
                    continue;
                }

                let r = Math.random() * totalWeight;
                let chosen = 0;
                for (let j = 0; j < weights.length; j++) {
                    r -= weights[j];
                    if (r <= 0) { chosen = j; break; }
                }

                winners.push(pool[chosen]);
                pool.splice(chosen, 1);
            }

            return winners;
        }

        function weightedRandomDrawGroups(eligibleGroups, count) {
            const winners = [];
            let pool = [...eligibleGroups];

            for (let i = 0; i < count && pool.length > 0; i++) {
                const weights = pool.map(g => g.probability_pct || 0);
                const totalWeight = weights.reduce((s, w) => s + w, 0);

                if (totalWeight <= 0) {
                    const idx = Math.floor(Math.random() * pool.length);
                    winners.push(pool[idx]);
                    pool.splice(idx, 1);
                    continue;
                }

                let r = Math.random() * totalWeight;
                let chosen = 0;
                for (let j = 0; j < weights.length; j++) {
                    r -= weights[j];
                    if (r <= 0) { chosen = j; break; }
                }

                winners.push(pool[chosen]);
                pool.splice(chosen, 1);
            }

            return winners;
        }

        // ===== Draw Flow =====
        async function startDraw() {
            if (isDrawing) return;
            // 不管當前在哪個頁籤，都先切回摸彩抽獎頁面
            switchLotteryTab('draw');
            const prizeId = parseInt(document.getElementById('prize-selector').value);
            const prize = allPrizes.find(p => p.id === prizeId);
            if (!prize) return alert('請選擇獎項');

            // 若此獎項已有中獎紀錄，先確認是否重新抽獎
            const existingWinners = allWinners.filter(w => w.prize_id === prizeId);
            if (existingWinners.length > 0) {
                if (!confirm('此獎項已有中獎紀錄，確定要重新抽獎嗎？\n這將會覆蓋現有的中獎紀錄。')) return;
            }

            // When re-drawing the same prize, same-prize winners should be eligible
            const redrawId = existingWinners.length > 0 ? prizeId : null;
            const eligible = drawMode === 'member' ? getEligibleMembers(redrawId) : getEligibleGroups(redrawId);
            const emptyMsg = drawMode === 'member' ? '沒有合格的成員可以抽獎' : '沒有合格的群組可以抽獎';
            if (eligible.length === 0) return alert(emptyMsg);

            const drawCount = Math.min(prize.winner_count, eligible.length);

            isDrawing = true;
            document.getElementById('btn-draw').disabled = true;
            document.getElementById('idle-message').classList.add('hidden');
            document.getElementById('winner-reveal').classList.add('hidden');

            // Pre-determine winners
            const winners = drawMode === 'member'
                ? weightedRandomDraw(eligible, drawCount)
                : weightedRandomDrawGroups(eligible, drawCount);

            // Init ball physics (both members and groups have id/name)
            const area = document.getElementById('ball-area');
            if (physics) physics.clear();
            physics = new BallPhysics(area);
            physics.init(eligible);

            // Phase 1: Bounce (3s)
            physics.start();

            // Phase 2: Slow down (3s)
            await sleep(3000);
            await new Promise(resolve => physics.slowDown(3000, resolve));

            // Phase 3: Stop & highlight winners
            physics.stop();
            const winnerIds = winners.map(w => w.id);
            physics.highlightWinners(winnerIds);

            // Phase 4: After highlight animation, show confetti + reveal
            await sleep(2000);
            fireConfetti();

            // Save winners to DB (replace existing winners for this prize)
            await saveWinners(winners, prizeId, true);

            // Reload winner data
            await loadWinners();
            renderWinnerHistory();
            updateEligibleCount();

            // Show reveal
            showWinnerReveal(prize, winners);

            isDrawing = false;
            document.getElementById('btn-draw').disabled = false;
        }

        async function saveWinners(winners, prizeId, replaceExisting = false) {
            if (replaceExisting) {
                const { error: delError } = await sbClient.from('lottery_winners').delete().eq('prize_id', prizeId);
                if (delError) console.error('清除舊中獎紀錄失敗：', delError);
            }
            const rows = drawMode === 'member'
                ? winners.map(w => ({ member_id: w.id, prize_id: prizeId }))
                : winners.map(w => ({ group_id: w.id, prize_id: prizeId }));
            const { error } = await sbClient.from('lottery_winners').insert(rows);
            if (error) console.error('儲存中獎紀錄失敗：', error);
        }

        function showWinnerReveal(prize, winners) {
            document.getElementById('reveal-prize-name').textContent = '🎉 ' + prize.name + ' 🎉';
            const container = document.getElementById('reveal-winners');
            container.innerHTML = '';
            winners.forEach((w, i) => {
                const card = document.createElement('div');
                card.className = 'winner-card-anim bg-gradient-to-br from-gold-500/20 to-gold-700/20 border-2 border-gold-400/60 rounded-2xl p-6 text-center min-w-[140px]';
                card.style.animationDelay = (i * 200) + 'ms';
                card.style.opacity = '0';
                if (drawMode === 'group') {
                    card.innerHTML = `
                        <p class="text-4xl mb-2">🏆</p>
                        <p class="text-2xl font-black text-gold-200">${w.name}</p>
                        <p class="text-gold-400/60 text-sm mt-1">（群組）</p>
                    `;
                } else {
                    const group = allGroups.find(g => g.id === w.group_id);
                    card.innerHTML = `
                        <p class="text-4xl mb-2">🏆</p>
                        <p class="text-2xl font-black text-gold-200">${w.name}</p>
                        <p class="text-gold-400/60 text-sm mt-1">${group ? group.name : ''}</p>
                    `;
                }
                container.appendChild(card);
            });
            document.getElementById('winner-reveal').classList.remove('hidden');
        }

        function closeReveal() {
            document.getElementById('winner-reveal').classList.add('hidden');
            if (physics) physics.clear();
            document.getElementById('idle-message').classList.remove('hidden');
        }

        // ===== Winner History =====
        function renderWinnerHistory() {
            const container = document.getElementById('winner-history');
            if (allWinners.length === 0) {
                container.innerHTML = '<p class="text-gold-400/40 text-center py-4">尚無中獎紀錄</p>';
                return;
            }

            // Group by prize
            const byPrize = {};
            allWinners.forEach(w => {
                const prizeId = w.prize_id;
                const prizeName = w.lottery_prizes?.name || '未知獎項';
                const sortOrder = w.lottery_prizes?.sort_order ?? 999;
                const winnerCount = w.lottery_prizes?.winner_count ?? 0;
                const key = sortOrder + '_' + prizeId;
                if (!byPrize[key]) byPrize[key] = { prizeId, name: prizeName, winnerCount, winners: [] };
                byPrize[key].winners.push(w);
            });

            const sortedKeys = Object.keys(byPrize).sort();
            let html = '';
            sortedKeys.forEach(key => {
                const prizeGroup = byPrize[key];
                const currentCount = prizeGroup.winners.length;
                const expectedCount = prizeGroup.winnerCount;
                const deficit = expectedCount - currentCount;

                html += `<div class="bg-midnight-800/50 rounded-xl border border-gold-700/30 p-3">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="text-gold-300 font-bold text-xs">${prizeGroup.name} (${currentCount}/${expectedCount})</h4>
                        ${deficit > 0 ? `<button onclick="redrawWinners(${prizeGroup.prizeId}, ${deficit})"
                            class="text-amber-400 hover:text-amber-200 text-xs font-bold px-2 py-0.5 rounded bg-amber-900/40 border border-amber-700/40">
                            重抽${deficit}人
                        </button>` : ''}
                    </div>
                    <div class="space-y-1">`;
                prizeGroup.winners.forEach(w => {
                    const isGroupWin = w.group_id != null && w.member_id == null;
                    const groupForWin = isGroupWin ? allGroups.find(g => g.id === w.group_id) : null;
                    const displayName = isGroupWin
                        ? (groupForWin?.name || '未知群組')
                        : (w.lottery_members?.name || '未知');
                    const groupObj = isGroupWin ? null : allGroups.find(g => g.id === w.lottery_members?.group_id);
                    const groupName = isGroupWin ? '群組' : (groupObj ? groupObj.name : '');
                    const noteText = w.note ? w.note : '';
                    const escapedName = displayName.replace(/'/g, "\\'");
                    const escapedGroup = groupName.replace(/'/g, "\\'");
                    const escapedPrize = prizeGroup.name.replace(/'/g, "\\'");
                    const escapedNote = (w.note || '').replace(/'/g, "\\'").replace(/\n/g, '\\n');
                    html += `<div class="text-gold-200 text-sm font-bold flex items-center justify-between group">
                        <div class="flex items-center space-x-2 min-w-0 flex-1">
                            <span class="text-gold-400 shrink-0">🏆</span><span class="truncate">${displayName}</span>
                            ${groupName ? `<span class="text-gold-400/50 text-xs shrink-0">(${groupName})</span>` : ''}
                            <button onclick="editWinnerNote(${w.id}, '${escapedNote}')"
                                class="hidden group-hover:inline-block text-gold-400/50 hover:text-gold-200 text-xs shrink-0" title="編輯備註">✏️</button>
                        </div>
                        <button onclick="removeWinner(${w.id}, '${escapedName}', '${escapedGroup}', '${escapedPrize}')"
                            class="hidden group-hover:inline-block text-red-400 hover:text-red-200 text-xs font-bold px-1.5 py-0.5 rounded bg-red-900/40 border border-red-700/40 shrink-0">✕</button>
                    </div>`;
                    if (noteText) {
                        html += `<div class="text-gold-400/50 text-xs ml-6 mb-1">📝 ${noteText}</div>`;
                    }
                });
                html += '</div></div>';
            });
            container.innerHTML = html;
        }

        async function editWinnerNote(winnerId, currentNote) {
            const note = prompt('請輸入備註（留空可清除）：', currentNote || '');
            if (note === null) return; // cancelled
            const { error } = await sbClient.from('lottery_winners').update({ note: note || null }).eq('id', winnerId);
            if (error) return alert('更新備註失敗：' + error.message);
            await loadWinners();
            renderWinnerHistory();
        }

        async function removeWinner(winnerId, memberName, groupName, prizeName) {
            const info = `${memberName}${groupName ? '（' + groupName + '）' : ''}`;
            if (!confirm(`確定要移除「${prizeName}」的中獎者 ${info} 嗎？\n移除後可以重抽補位。`)) return;
            const { error } = await sbClient.from('lottery_winners').delete().eq('id', winnerId);
            if (error) return alert('移除失敗：' + error.message);
            await loadWinners();
            renderWinnerHistory();
            updateEligibleCount();
        }

        async function redrawWinners(prizeId, count) {
            if (isDrawing) return;
            if (!confirm(`確定要為此獎項重抽 ${count} 人嗎？`)) return;

            // Get eligible items (exclude winners from OTHER prizes, allow same-prize winners back into pool)
            const eligible = drawMode === 'member' ? getEligibleMembers(prizeId) : getEligibleGroups(prizeId);
            const itemLabel = drawMode === 'member' ? '人' : '組';
            if (eligible.length === 0) return alert(`沒有合格的${drawMode === 'member' ? '成員' : '群組'}可以抽獎`);
            if (eligible.length < count) {
                if (!confirm(`合格${itemLabel}數僅 ${eligible.length}，少於需求 ${count}。是否抽取 ${eligible.length}${itemLabel}？`)) return;
                count = eligible.length;
            }

            isDrawing = true;
            document.getElementById('btn-draw').disabled = true;
            document.getElementById('idle-message').classList.add('hidden');
            document.getElementById('winner-reveal').classList.add('hidden');

            const winners = drawMode === 'member'
                ? weightedRandomDraw(eligible, count)
                : weightedRandomDrawGroups(eligible, count);
            const prize = allPrizes.find(p => p.id === prizeId);

            // Ball animation
            const area = document.getElementById('ball-area');
            if (physics) physics.clear();
            physics = new BallPhysics(area);
            physics.init(eligible);
            physics.start();

            await sleep(3000);
            await new Promise(resolve => physics.slowDown(3000, resolve));
            physics.stop();

            const winnerIds = winners.map(w => w.id);
            physics.highlightWinners(winnerIds);

            await sleep(2000);
            fireConfetti();

            await saveWinners(winners, prizeId);
            await loadWinners();
            renderWinnerHistory();
            updateEligibleCount();

            if (prize) showWinnerReveal(prize, winners);

            isDrawing = false;
            document.getElementById('btn-draw').disabled = false;
        }

        // ===== Confetti =====
        function fireConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;
            const frame = () => {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.7 }, colors: ['#ffc24a', '#ffaa1d', '#f98c00', '#ffedc6'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.7 }, colors: ['#ffc24a', '#ffaa1d', '#f98c00', '#ffedc6'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            };
            frame();
        }

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        // ===== Lottery Tab Switching =====
        let currentLotteryTab = 'draw';

        function switchLotteryTab(tabName) {
            currentLotteryTab = tabName;
            // Hide all tab contents
            const tabIds = ['lottery-tab-draw', 'lottery-tab-group-view', 'lottery-tab-member-stats', 'lottery-tab-winner-stats', 'lottery-tab-individual-stats'];
            tabIds.forEach(id => document.getElementById(id).classList.add('hidden'));
            // Show selected tab
            document.getElementById('lottery-tab-' + tabName).classList.remove('hidden');

            // Update button styles
            document.querySelectorAll('.lottery-tab-btn').forEach(btn => {
                if (btn.dataset.lotteryTab === tabName) {
                    btn.className = 'lottery-tab-btn px-5 py-3 font-bold text-sm transition-all border-b-2 border-gold-400 text-gold-200';
                } else {
                    btn.className = 'lottery-tab-btn px-5 py-3 font-bold text-sm transition-all border-b-2 border-transparent text-gold-500/50 hover:text-gold-300';
                }
            });

            // Load data for selected tab
            if (tabName === 'group-view') renderGroupView();
            if (tabName === 'member-stats') renderMemberStats();
            if (tabName === 'winner-stats') renderWinnerStats();
            if (tabName === 'individual-stats') renderIndividualStats();

        // ===== Supabase Realtime Auto-Sync =====
        let pollInterval = null;
        let lastWinnerHash = '';

        function getWinnerHash() {
            return allWinners.map(w => w.id).sort().join(',');
        }

        function setupRealtimeSync() {
            // 合併 4 個 postgres_changes 為 1 個 channel（減少 Realtime 連線負載）
            sbClient
                .channel('lottery-data-sync')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'lottery_prizes' }, async () => {
                    const oldSelectedId = document.getElementById('prize-selector').value;
                    await Promise.all([loadPrizes(), loadWinners()]);
                    populatePrizeSelector();
                    const sel = document.getElementById('prize-selector');
                    if (oldSelectedId && allPrizes.find(p => p.id === parseInt(oldSelectedId))) {
                        sel.value = oldSelectedId;
                    }
                    sel.dispatchEvent(new Event('change'));
                    renderWinnerHistory();
                    if (currentLotteryTab === 'winner-stats') renderWinnerStats();
                    if (currentLotteryTab === 'individual-stats') renderIndividualStats();
                    if (currentLotteryTab === 'group-view') renderGroupView();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'lottery_winners' }, async () => {
                    if (isDrawing) return;
                    await loadWinners();
                    renderWinnerHistory();
                    updateEligibleCount();
                    if (currentLotteryTab === 'winner-stats') renderWinnerStats();
                    if (currentLotteryTab === 'individual-stats') renderIndividualStats();
                    if (currentLotteryTab === 'group-view') renderGroupView();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'lottery_groups' }, async () => {
                    await loadGroups();
                    updateEligibleCount();
                    if (currentLotteryTab === 'group-view') renderGroupView();
                    if (currentLotteryTab === 'member-stats') renderMemberStats();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'lottery_members' }, async () => {
                    await loadGroups();
                    updateEligibleCount();
                    if (currentLotteryTab === 'group-view') renderGroupView();
                    if (currentLotteryTab === 'member-stats') renderMemberStats();
                })
                .subscribe();

            // Listen for admin broadcast (reliable sync when admin removes/redraws winners)
            sbClient
                .channel('lottery-broadcast-sync')
                .on('broadcast', { event: 'winners-changed' }, async () => {
                    if (isDrawing) return;
                    await loadWinners();
                    lastWinnerHash = getWinnerHash();
                    renderWinnerHistory();
                    updateEligibleCount();
                    if (currentLotteryTab === 'winner-stats') renderWinnerStats();
                    if (currentLotteryTab === 'individual-stats') renderIndividualStats();
                    if (currentLotteryTab === 'group-view') renderGroupView();
                })
                .subscribe();

            // Polling fallback: check for winner changes every 5 seconds
            lastWinnerHash = getWinnerHash();
            pollInterval = setInterval(async () => {
                if (isDrawing) return;
                try {
                    await loadWinners();
                    const newHash = getWinnerHash();
                    if (newHash !== lastWinnerHash) {
                        lastWinnerHash = newHash;
                        renderWinnerHistory();
                        updateEligibleCount();
                    }
                    // Also refresh prizes and groups
                    const oldSelectedId = document.getElementById('prize-selector').value;
                    await Promise.all([loadPrizes(), loadGroups()]);
                    populatePrizeSelector();
                    const sel = document.getElementById('prize-selector');
                    if (oldSelectedId && allPrizes.find(p => p.id === parseInt(oldSelectedId))) {
                        sel.value = oldSelectedId;
                    }
                    sel.dispatchEvent(new Event('change'));

                    // Refresh active tab data
                    if (currentLotteryTab === 'group-view') renderGroupView();
                    if (currentLotteryTab === 'member-stats') renderMemberStats();
                    if (currentLotteryTab === 'winner-stats') renderWinnerStats();
                    if (currentLotteryTab === 'individual-stats') renderIndividualStats();
                } catch (e) {
                    console.error('Polling sync error:', e);
                }
            }, 5000);
        }

        // ===== Prize Management (Frontend) =====
        function openLotteryPrizeModal(id, name, winnerCount) {
            document.getElementById('lottery-prize-edit-id').value = id || '';
            document.getElementById('lottery-prize-name').value = name || '';
            document.getElementById('lottery-prize-wc-input').value = winnerCount ?? 1;
            document.getElementById('lottery-prize-modal-title').textContent = id ? '編輯獎項' : '新增獎項';
            document.getElementById('lottery-prize-modal').classList.remove('hidden');
        }

        function closeLotteryPrizeModal() {
            document.getElementById('lottery-prize-modal').classList.add('hidden');
        }

        async function saveLotteryPrize() {
            const id = document.getElementById('lottery-prize-edit-id').value;
            const name = document.getElementById('lottery-prize-name').value.trim();
            const winner_count = parseInt(document.getElementById('lottery-prize-wc-input').value) || 1;
            if (!name) return alert('請輸入獎項名稱');

            if (id) {
                const { error } = await sbClient.from('lottery_prizes').update({ name, winner_count }).eq('id', id);
                if (error) return alert('更新失敗：' + error.message);
            } else {
                const { data: existing } = await sbClient.from('lottery_prizes').select('sort_order').order('sort_order', { ascending: false }).limit(1);
                const sort_order = (existing && existing.length > 0) ? existing[0].sort_order + 1 : 0;
                const { error } = await sbClient.from('lottery_prizes').insert({ name, winner_count, sort_order });
                if (error) return alert('新增失敗：' + error.message);
            }
            closeLotteryPrizeModal();
            await Promise.all([loadPrizes(), loadWinners()]);
            const oldSelectedId = document.getElementById('prize-selector').value;
            populatePrizeSelector();
            const sel = document.getElementById('prize-selector');
            if (oldSelectedId && allPrizes.find(p => p.id === parseInt(oldSelectedId))) {
                sel.value = oldSelectedId;
            }
            sel.dispatchEvent(new Event('change'));
            renderWinnerHistory();
            broadcastPrizesChanged();
        }

        function editCurrentPrize() {
            const prizeId = parseInt(document.getElementById('prize-selector').value);
            const prize = allPrizes.find(p => p.id === prizeId);
            if (!prize) return;
            openLotteryPrizeModal(prize.id, prize.name, prize.winner_count);
        }

        async function deleteCurrentPrize() {
            const prizeId = parseInt(document.getElementById('prize-selector').value);
            const prize = allPrizes.find(p => p.id === prizeId);
            if (!prize) return;
            if (!confirm(`確定刪除獎項「${prize.name}」？相關中獎紀錄也會被刪除。`)) return;
            // Delete related winners first
            await sbClient.from('lottery_winners').delete().eq('prize_id', prizeId);
            const { error } = await sbClient.from('lottery_prizes').delete().eq('id', prizeId);
            if (error) return alert('刪除失敗：' + error.message);
            await Promise.all([loadPrizes(), loadWinners()]);
            populatePrizeSelector();
            renderWinnerHistory();
            updateEligibleCount();
            broadcastPrizesChanged();
        }

        function broadcastPrizesChanged() {
            try {
                const ch = sbClient.channel('lottery-broadcast-sync');
                ch.send({ type: 'broadcast', event: 'winners-changed', payload: {} });
            } catch (e) { /* ignore */ }
        }

        // Show/hide edit & delete buttons based on prize selection
        function updatePrizeActionButtons() {
            const prizeId = document.getElementById('prize-selector').value;
            const show = !!prizeId;
            document.getElementById('btn-edit-prize').classList.toggle('hidden', !show);
            document.getElementById('btn-delete-prize').classList.toggle('hidden', !show);
        }

        // ===== Login Guard =====
        if (localStorage.getItem('admin_logged_in') !== '1') {
            document.getElementById('lottery-login-guard').classList.remove('hidden');
            document.getElementById('lottery-main-content').classList.add('hidden');
        } else {
            // ===== Start =====
            initLottery();
            setupRealtimeSync();
        }
    </script>
</body>

</html>
