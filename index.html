<script>
    const SUPABASE_URL = "https://jwwhkbxgcbasmgkgmrvl.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3d2hrYnhnY2Jhc21na2dtcnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEzODYsImV4cCI6MjA4ODI0NzM4Nn0.B_9hBrm8aUO6lGmyCCyBdSU49Xv2EPLGOnjet1Lf8jE";
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const FIXED_TIME = 10;

    let myName = "", currentQ = null, startTime = 0, timerInterval = null, hasAnswered = false, currentSelection = 0, totalScore = 0;
    let channel = null;

    async function join() {
        myName = document.getElementById('p-name').value.trim();
        if (!myName) return alert("請輸入名字");

        // 檢查暱稱是否重複，若重複則嘗試讀取舊有總分 (若有實作持久化可用，目前先維持 insert)
        const { error } = await sbClient.from('players').insert({ name: myName });
        if (error) return alert("名字可能被拿走囉，請換一個！");

        document.getElementById('user-display').innerText = myName;
        document.getElementById('login-ui').classList.add('hidden');
        document.getElementById('waiting-ui').classList.remove('hidden');

        listenToHost(); // 開啟監聽
    }

    function listenToHost() {
        // 1. 先抓取目前的狀態 (處理中途加入)
        checkCurrentStatus();

        // 2. 建立 Realtime 頻道
        if (channel) sbClient.removeChannel(channel);

        channel = sbClient.channel('quiz-control')
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'game_status',
                filter: 'id=eq.1'
            }, (payload) => {
                console.log("收到狀態更新:", payload.new);
                handleStateChange(payload.new);
            })
            .subscribe((status) => {
                console.log("Realtime 訂閱狀態:", status);
            });
    }

    async function checkCurrentStatus() {
        const { data, error } = await sbClient.from('game_status').select('*').eq('id', 1).single();
        if (data) {
            console.log("初始狀態讀取:", data);
            handleStateChange(data);
        }
    }

    async function handleStateChange(status) {
        if (status.state === 'waiting') {
            stopTimer();
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('end-ui').classList.add('hidden');
            document.getElementById('waiting-ui').classList.remove('hidden');
        }
        else if (status.state === 'playing') {
            // 避免重複載入同一題 (若已經在作答中)
            if (currentQ && currentQ.id === status.current_q_id && !document.getElementById('game-ui').classList.contains('hidden')) {
                return;
            }

            const { data: q } = await sbClient.from('questions').select('*').eq('id', status.current_q_id).single();
            if (q) {
                currentQ = q;
                startTime = status.start_time;
                hasAnswered = false;
                currentSelection = 0;

                // 檢查是否中途進場且時間已過
                const now = Date.now();
                const elapsedSec = (now - startTime) / 1000;

                if (elapsedSec >= FIXED_TIME) {
                    showFeedback(false, "來晚了！本題作答時間已結束。");
                    document.getElementById('waiting-ui').classList.add('hidden');
                    document.getElementById('game-ui').classList.remove('hidden');
                } else {
                    document.getElementById('waiting-ui').classList.add('hidden');
                    document.getElementById('game-ui').classList.remove('hidden');
                    resetUI();
                    refreshUI(q);
                    startTimer(FIXED_TIME, startTime); // 傳入基準時間同步
                }
            }
        }
        else if (status.state === 'ended') {
            stopTimer();
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('waiting-ui').classList.add('hidden');
            document.getElementById('end-ui').classList.remove('hidden');
            document.getElementById('final-score').innerText = totalScore;
            confetti({ particleCount: 400, spread: 120, origin: { y: 0.4 }, colors: ['#fbbf24', '#ffffff'] });
        }
    }

    function resetUI() {
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('options-grid').classList.remove('hidden');
        document.getElementById('submit-btn').classList.add('hidden');
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = false;
            btn.classList.remove('grayscale', 'selected-opt', 'dimmed-opt');
        });
    }

    function refreshUI(q) {
        document.getElementById('q-category').innerText = `Question ${q.id}`;
        document.getElementById('q-text').innerText = q.question;
        document.getElementById('opt1').innerText = q.option_a;
        document.getElementById('opt2').innerText = q.option_b;
        document.getElementById('opt3').innerText = q.option_c;
        document.getElementById('opt4').innerText = q.option_d;
    }

    function startTimer(duration, syncStartTime) {
        stopTimer();
        const timerEl = document.getElementById('timer');

        timerInterval = setInterval(() => {
            const now = Date.now();
            const remaining = Math.max(0, duration - (now - syncStartTime) / 1000);

            timerEl.innerText = remaining.toFixed(1) + "s";

            if (remaining <= 3) {
                timerEl.classList.add('text-red-500', 'timer-flash');
            } else {
                timerEl.classList.remove('text-red-500', 'timer-flash');
            }

            if (remaining <= 0) {
                stopTimer();
                if (!hasAnswered) processAnswer(0);
            }
        }, 100);
    }

    function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
    }

    function selectOption(choice) {
        if (hasAnswered) return;
        currentSelection = choice;
        for (let i = 1; i <= 4; i++) {
            const btn = document.getElementById('opt' + i);
            if (i === choice) {
                btn.classList.add('selected-opt');
                btn.classList.remove('dimmed-opt');
            } else {
                btn.classList.remove('selected-opt');
                btn.classList.add('dimmed-opt');
            }
        }
        document.getElementById('submit-btn').classList.remove('hidden');
    }

    function submitAnswer() {
        if (currentSelection === 0 || hasAnswered) return;
        processAnswer(currentSelection);
    }

    async function processAnswer(choice) {
        if (hasAnswered) return;
        hasAnswered = true;
        stopTimer();

        document.getElementById('submit-btn').classList.add('hidden');
        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

        const now = Date.now();
        const elapsedMs = now - startTime;
        const elapsedSec = elapsedMs / 1000;
        const isCorrect = (choice === currentQ.answer);

        let earnedScore = 0;
        if (isCorrect) {
            // 計分權重：速度越快分數越高
            earnedScore = Math.max(0, Math.floor(currentQ.points * (1 - (elapsedSec / FIXED_TIME))));
            totalScore += earnedScore;
            document.getElementById('score-display').innerText = totalScore;

            // 更新資料庫分數 (非同步)
            sbClient.rpc('increment_score', { player_name: myName, score_val: earnedScore });
            showFeedback(true, `答對了！+${earnedScore} 分`);
        } else {
            const correctLabel = ["", currentQ.option_a, currentQ.option_b, currentQ.option_c, currentQ.option_d][currentQ.answer];
            showFeedback(false, choice === 0 ? `時間到！正解: ${correctLabel}` : `答錯囉！正解: ${correctLabel}`);
        }

        // 紀錄作答詳情
        sbClient.from('responses').insert({
            player_name: myName,
            question_id: currentQ.id,
            choice: choice,
            is_correct: isCorrect,
            response_time_ms: elapsedMs
        }).then();
    }

    function showFeedback(isSuccess, msg) {
        const fb = document.getElementById('feedback');
        const grid = document.getElementById('options-grid');
        grid.classList.add('hidden');
        fb.innerText = msg;
        fb.classList.remove('hidden');

        if (isSuccess) {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#fbbf24', '#3b82f6'] });
            fb.className = "text-center p-8 rounded-3xl text-3xl font-black bg-emerald-900/50 text-gold-200 border-2 border-emerald-500 block mt-6 shadow-2xl";
        } else {
            fb.className = "text-center p-8 rounded-3xl text-3xl font-black bg-red-950/60 text-red-200 border-2 border-red-800 block mt-6 shadow-2xl";
        }
    }
</script>
