<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滙智 10 週年互動問答</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .option-btn {
            @apply w-full py-5 text-2xl font-bold text-white rounded-2xl shadow-lg transform transition-all active:scale-95 disabled:grayscale-[0.5] disabled:opacity-50;
        }

        .selected-opt {
            @apply ring-4 ring-gold-400 scale-95;
            background: linear-gradient(135deg, #ffbc40, #e8a020) !important;
            color: #182240 !important;
            box-shadow: 0 0 25px rgba(255, 210, 100, 0.4);
        }

        .dimmed-opt {
            @apply opacity-50 saturate-50;
        }

        .countdown-ring {
            transform: rotate(-90deg);
        }

        .countdown-ring circle {
            transition: stroke-dashoffset 0.1s linear;
        }

        /* 手動同步按鈕 */
        .sync-btn {
            @apply fixed top-4 right-4 z-50 bg-gold-600/80 hover:bg-gold-500 text-midnight-950 rounded-full w-12 h-12 flex items-center justify-center shadow-lg transition-all active:scale-90;
            backdrop-filter: blur(8px);
        }
        .sync-btn.syncing svg {
            animation: spin 0.6s linear;
        }

        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slide-up 0.3s ease-out;
        }

        .correct-opt {
            ring: 4px solid #34d399;
            background: linear-gradient(135deg, #059669, #047857) !important;
            color: #fff !important;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
            border-color: #34d399 !important;
            opacity: 1 !important;
            filter: none !important;
        }

        .incorrect-opt {
            background: linear-gradient(135deg, #dc2626, #b91c1c) !important;
            color: #fff !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.5);
            border-color: #f87171 !important;
            opacity: 1 !important;
            filter: none !important;
        }
    </style>
</head>

<body class="bg-midnight-900 text-gold-100 font-sans min-h-screen">
    <!-- 手動同步按鈕（登入後才顯示） -->
    <button id="sync-btn" class="sync-btn hidden" onclick="manualRefresh()" title="同步題目狀態">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
    </button>

    <div id="app" class="max-w-3xl mx-auto p-6">

        <div id="no-token-ui" class="hidden text-center mt-16 space-y-8">
            <div class="flex flex-col items-center justify-center space-y-6 bg-amber-50 p-8 rounded-3xl">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-32 md:h-40 w-auto object-contain drop-shadow-[0_0_15px_rgba(255,210,100,0.2)]">
                <h1 class="text-5xl md:text-6xl font-black text-teal-900 tracking-tight drop-shadow-lg">滙智 10 週年挑戰賽
                </h1>
            </div>
            <div class="bg-midnight-900/50 p-8 rounded-3xl border border-gold-700/30 shadow-2xl backdrop-blur-sm">
                <p class="text-3xl text-gold-200 font-bold mb-4">請掃描 QR Code 加入遊戲</p>
                <p class="text-xl text-gold-300/80">請在主持人的螢幕上掃描 QR Code 來參與挑戰</p>
            </div>
        </div>

        <div id="login-ui" class="text-center mt-16 space-y-8">
            <div class="flex flex-col items-center justify-center space-y-6 bg-amber-50 p-8 rounded-3xl">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-32 md:h-40 w-auto object-contain drop-shadow-[0_0_15px_rgba(255,210,100,0.2)]">
                <h1 class="text-5xl md:text-6xl font-black text-teal-900 tracking-tight drop-shadow-lg">滙智 10 週年挑戰賽
                </h1>
            </div>
            <div class="bg-midnight-900/50 p-8 rounded-3xl border border-gold-700/30 shadow-2xl backdrop-blur-sm">
                <input id="p-name" type="text" placeholder="請輸入您的暱稱"
                    class="w-full p-5 rounded-2xl text-midnight-950 text-2xl text-center focus:ring-4 focus:ring-gold-500 outline-none shadow-inner bg-gold-100 placeholder-gold-800/50 font-bold border-2 border-gold-600/50">
                <p class="mt-3 text-gold-300/80 text-base">請輸入您的暱稱，相同的暱稱只能輸入一次，請謹慎輸入完再送出</p>
                <button onclick="join()"
                    class="w-full mt-6 bg-gradient-to-r from-gold-500 to-gold-700 py-5 rounded-2xl text-3xl font-black shadow-[0_0_25px_rgba(255,210,100,0.3)] text-midnight-950">登入挑戰</button>
            </div>
        </div>

        <div id="waiting-ui" class="hidden text-center mt-32 space-y-10">
            <div class="bg-midnight-900/60 p-10 rounded-3xl border-2 border-gold-600/40 shadow-2xl backdrop-blur-md">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-gold-400 mx-auto mb-6"></div>
                <h2 class="text-4xl font-bold text-gold-100 mb-4">哈囉，<span id="user-display"
                        class="text-gold-gradient"></span></h2>
                <p class="text-2xl text-gold-200/80 leading-relaxed">請看大螢幕，<br>等待主持人開放作答...</p>
            </div>
            <button onclick="exitGame()" class="text-gold-300/50 hover:text-gold-200 text-base underline underline-offset-4 transition-colors">退出遊戲</button>
        </div>

        <div id="scoring-ui" class="hidden text-center mt-16 space-y-6">
            <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                class="h-28 w-auto object-contain mx-auto drop-shadow-[0_0_15px_rgba(255,210,100,0.2)]">
            <div id="test-mode-badge" class="hidden">
                <span class="inline-block bg-amber-600/80 text-white text-sm font-bold px-4 py-1 rounded-full">測試模式</span>
            </div>
            <p class="text-3xl text-gold-200 font-bold">本題結算完成</p>

            <!-- 正確答案 -->
            <div id="scoring-answer" class="hidden bg-green-900/40 px-8 py-5 rounded-2xl border-2 border-green-500/50">
                <p class="text-lg text-green-300/80 mb-1">正確答案</p>
                <div id="scoring-answer-text" class="text-3xl font-black text-green-200"></div>
            </div>

            <!-- 答案媒體（多媒體） -->
            <div id="scoring-media" class="hidden space-y-3">
                <div id="scoring-images-row" class="flex overflow-x-auto snap-x gap-3 justify-center"></div>
                <div id="scoring-videos-col" class="space-y-3 flex flex-col items-center"></div>
            </div>

            <!-- 答案 Note 註記（scoring 狀態） -->
            <div id="scoring-note" class="hidden bg-green-900/30 px-5 py-4 rounded-2xl border border-green-500/30">
                <p class="text-sm text-green-300/70 font-bold mb-1">📝 Note</p>
                <p id="scoring-note-text" class="text-green-200 font-bold text-lg whitespace-pre-wrap"></p>
            </div>

            <!-- 本題積分 -->
            <div class="bg-midnight-900/50 px-8 py-6 rounded-2xl border border-gold-700/30">
                <p class="text-lg text-gold-300/70 mb-1">您本題獲得的積分</p>
                <div id="scoring-question-score" class="text-4xl font-black text-gold-200"></div>
            </div>

            <!-- 累計積分 -->
            <div class="bg-midnight-900/60 px-8 py-8 rounded-3xl border-2 border-gold-600/40 shadow-[0_0_30px_rgba(255,210,100,0.08)]">
                <p class="text-lg text-gold-300/70 mb-2">您的累計積分</p>
                <div id="scoring-total-score" class="text-6xl font-black text-gold-gradient"></div>
            </div>

            <!-- 等待提示 -->
            <div class="flex items-center justify-center gap-4 pt-2">
                <div class="animate-spin rounded-full h-8 w-8 border-b-3 border-gold-400"></div>
                <p class="text-xl text-gold-200/50">等待主持人進入下一題...</p>
            </div>
            <button onclick="exitGame()" class="text-gold-300/50 hover:text-gold-200 text-base underline underline-offset-4 transition-colors">退出遊戲</button>
        </div>

        <div id="game-ui" class="hidden space-y-6">
            <div
                class="flex justify-center items-center bg-amber-50 p-5 rounded-3xl border-2 border-gold-600/40">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-12 w-auto object-contain opacity-80">
            </div>

            <div class="py-6 text-center space-y-4 bg-teal-900/25 rounded-3xl p-6 border border-teal-600/30">
                <div class="flex items-center justify-between">
                    <div id="q-category"
                        class="text-lg text-gold-300 font-bold uppercase bg-teal-800/50 px-6 py-2 rounded-full border-2 border-teal-500/40 inline-block">
                        Question</div>
                    <div id="countdown-container" class="relative flex items-center justify-center">
                        <svg class="countdown-ring" width="64" height="64" viewBox="0 0 64 64">
                            <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(187,82,0,0.3)" stroke-width="5" />
                            <circle id="countdown-circle" cx="32" cy="32" r="28" fill="none" stroke="#ffaa1d"
                                stroke-width="5" stroke-linecap="round" stroke-dasharray="175.93"
                                stroke-dashoffset="0" />
                        </svg>
                        <span id="countdown-text" class="absolute text-xl font-black text-gold-300">15.0</span>
                    </div>
                </div>
                <h2 id="q-text" class="text-2xl md:text-3xl font-bold leading-tight text-gold-100">載入中...</h2>

                <!-- 題目媒體（多媒體） -->
                <div id="q-media" class="hidden mt-4 space-y-3">
                    <div id="q-images-row" class="flex overflow-x-auto snap-x gap-3 justify-center"></div>
                    <div id="q-videos-col" class="space-y-3 flex flex-col items-center"></div>
                </div>
            </div>

            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <button onclick="selectOption(1)" id="opt1"
                    class="option-btn bg-teal-800/60 border-2 border-teal-500/40 text-xl font-bold py-3">A</button>

                <button onclick="selectOption(2)" id="opt2"
                    class="option-btn bg-teal-700/55 border-2 border-teal-500/40 text-xl font-bold py-3">B</button>

                <button onclick="selectOption(3)" id="opt3"
                    class="option-btn bg-teal-800/55 border-2 border-teal-500/40 text-xl font-bold py-3">C</button>

                <button onclick="selectOption(4)" id="opt4"
                    class="option-btn bg-teal-700/60 border-2 border-teal-500/40 text-xl font-bold py-3">D</button>
            </div>

            <button id="submit-btn" onclick="submitAnswer()"
                class="w-full mt-6 py-5 bg-gradient-to-r from-gold-500 to-gold-700 text-midnight-950 rounded-2xl text-3xl font-black hidden shadow-lg">確認送出</button>
            <div id="feedback" class="hidden text-center p-6 rounded-2xl text-3xl font-black mt-6 shadow-2xl"></div>

            <!-- 公布答案時的答案媒體 -->
            <div id="reveal-media" class="hidden space-y-3 mt-4">
                <div id="reveal-images-row" class="flex overflow-x-auto snap-x gap-3 justify-center"></div>
                <div id="reveal-videos-col" class="space-y-3 flex flex-col items-center"></div>
            </div>
            <!-- 答案 Note 註記（revealed 狀態） -->
            <div id="reveal-note" class="hidden mt-4 bg-green-900/30 px-5 py-4 rounded-2xl border border-green-500/30">
                <p class="text-sm text-green-300/70 font-bold mb-1">📝 Note</p>
                <p id="reveal-note-text" class="text-green-200 font-bold text-lg whitespace-pre-wrap"></p>
            </div>
            <button onclick="exitGame()" class="text-gold-300/50 hover:text-gold-200 text-base underline underline-offset-4 transition-colors mt-4">退出遊戲</button>
        </div>

        <div id="end-ui" class="hidden text-center mt-20 space-y-8">
            <div class="flex flex-col items-center justify-center space-y-6 bg-amber-50 p-8 rounded-3xl">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-32 md:h-40 w-auto object-contain drop-shadow-[0_0_15px_rgba(255,210,100,0.2)]">
                <h1 class="text-5xl md:text-6xl font-black text-teal-900 tracking-tight drop-shadow-lg">挑戰結束！</h1>
            </div>
            <!-- 自己的名次與分數 -->
            <div class="bg-gradient-to-b from-[#243d5c] to-[#1c3250] p-10 rounded-3xl border border-gold-500/25 shadow-xl space-y-4">
                <div id="end-rank" class="text-5xl font-black text-gold-300"></div>
                <div id="end-score" class="text-3xl text-gold-200 font-bold"></div>
            </div>
            <!-- 前三名排行榜 -->
            <div class="bg-gradient-to-b from-[#243d5c] to-[#1c3250] p-8 rounded-3xl border border-gold-500/25 shadow-xl space-y-4">
                <h2 class="text-3xl font-black text-gold-100">🏆 排行榜</h2>
                <div id="end-top3" class="space-y-3"></div>
            </div>
            <p class="text-xl text-gold-200/60">感謝您的參與！</p>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://jwwhkbxgcbasmgkgmrvl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3d2hrYnhnY2Jhc21na2dtcnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEzODYsImV4cCI6MjA4ODI0NzM4Nn0.B_9hBrm8aUO6lGmyCCyBdSU49Xv2EPLGOnjet1Lf8jE";

        let sbClient, myName = "", currentQ = null, startTime = 0, hasAnswered = false, currentSelection = 0, channel = null, lastProcessedKey = '', pollInterval = null, questionIdOrder = [], qrToken = null, currentMode = 'official';
        let countdownTimer = null;
        const COUNTDOWN_TOTAL = 15000; // 15 seconds in ms
        const COUNTDOWN_CIRCUMFERENCE = 2 * Math.PI * 28; // ~175.93

        window.onload = async () => {
            if (!window.supabase) {
                alert("網路不穩定，通訊元件載入失敗，請重新整理網頁");
                return;
            }
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // 檢查 URL 是否有 QR token
            const urlParams = new URLSearchParams(window.location.search);
            qrToken = urlParams.get('token');

            if (!qrToken) {
                // 沒有 token → 顯示「請掃描 QR Code」提示
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('no-token-ui').classList.remove('hidden');
                return;
            }

            console.log("Supabase 初始化成功");

            // 重新整理恢復：若 sessionStorage 中有已保存的暱稱，自動重新加入
            const savedName = sessionStorage.getItem('quiz_player_name');
            if (savedName) {
                myName = savedName;
                const { data: qList } = await sbClient.from('questions').select('id, sort_order, type').order('sort_order', { ascending: true }).order('id', { ascending: true });
                questionIdOrder = qList || [];
                document.getElementById('user-display').innerText = myName;
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('waiting-ui').classList.remove('hidden');
                document.getElementById('sync-btn').classList.remove('hidden');
                listenToHost();
                return;
            }
        };

        async function join() {
            myName = document.getElementById('p-name').value.trim();
            if (!myName) return alert("請輸入名字");

            // 透過 RPC 驗證 QR token 並加入遊戲
            const { data, error } = await sbClient.rpc('join_via_qr', {
                qr_token: qrToken,
                player_name: myName
            });
            if (error) {
                console.error("join_via_qr error:", error);
                if (error.message && error.message.includes('Invalid QR token')) {
                    return alert("無效的 QR Code，請重新掃描！");
                }
                if (error.message && (error.message.includes('duplicate') || error.message.includes('already') || error.message.includes('unique') || error.message.includes('已存在') || error.message.includes('暱稱'))) {
                    return alert("此暱稱已被使用，請換一個暱稱再試！");
                }
                return alert("加入失敗：" + (error.message || "未知錯誤"));
            }

            // 載入題目 ID 順序，用於顯示題號
            const { data: qList } = await sbClient.from('questions').select('id, sort_order, type').order('sort_order', { ascending: true }).order('id', { ascending: true });
            questionIdOrder = qList || [];

            sessionStorage.setItem('quiz_player_name', myName);
            document.getElementById('user-display').innerText = myName;
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('waiting-ui').classList.remove('hidden');
            document.getElementById('sync-btn').classList.remove('hidden');

            listenToHost();
        }

        function listenToHost() {
            checkCurrentStatus(); // 處理中途進場

            if (channel) sbClient.removeChannel(channel);

            channel = sbClient.channel('quiz-control')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'game_status',
                    filter: 'id=eq.1'
                }, (payload) => {
                    console.log("偵測到主持人指令:", payload.new.state);
                    const key = `${payload.new.state}_${payload.new.current_q_id}_${payload.new.start_time}`;
                    lastProcessedKey = key;
                    handleStateChange(payload.new);
                })
                .subscribe((status) => {
                    console.log("廣播連線狀態:", status);
                });

            // 輪詢備援：每 15 秒檢查一次，防止即時連線漏接（Realtime 為主）
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(checkCurrentStatus, 15000);
        }

        async function checkCurrentStatus() {
            const { data } = await sbClient.from('game_status').select('*').eq('id', 1).single();
            if (data) {
                const key = `${data.state}_${data.current_q_id}_${data.start_time}`;
                if (key !== lastProcessedKey) {
                    lastProcessedKey = key;
                    handleStateChange(data);
                }
            }
        }

        function hideAllUI() {
            ['waiting-ui', 'game-ui', 'scoring-ui', 'end-ui'].forEach(id =>
                document.getElementById(id).classList.add('hidden')
            );
        }

        function startCountdown() {
            stopCountdown();
            const countdownStart = Date.now();
            const textEl = document.getElementById('countdown-text');
            const circleEl = document.getElementById('countdown-circle');

            countdownTimer = setInterval(() => {
                const elapsed = Date.now() - countdownStart;
                const remaining = Math.max(0, COUNTDOWN_TOTAL - elapsed);
                const seconds = (remaining / 1000).toFixed(1);

                textEl.innerText = seconds;
                // Update ring: full circle = 0 offset, empty = full circumference
                const offset = COUNTDOWN_CIRCUMFERENCE * (1 - remaining / COUNTDOWN_TOTAL);
                circleEl.setAttribute('stroke-dashoffset', offset);

                // Color transition: gold -> red as time runs out
                if (remaining < 5000) {
                    circleEl.setAttribute('stroke', '#ef4444');
                    textEl.classList.remove('text-gold-300');
                    textEl.classList.add('text-red-400');
                } else {
                    circleEl.setAttribute('stroke', '#ffaa1d');
                    textEl.classList.remove('text-red-400');
                    textEl.classList.add('text-gold-300');
                }

                if (remaining <= 0) {
                    stopCountdown();
                    if (!hasAnswered) {
                        // Auto-submit: send current selection (or 0 if nothing selected)
                        processAnswer(currentSelection);
                    }
                }
            }, 100);
        }

        function stopCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        let stateVersion = 0; // 防止並發 handleStateChange 的競態條件

        async function handleStateChange(status) {
            const myVersion = ++stateVersion;
            currentMode = status.mode || 'official';
            if (status.state === 'waiting') {
                hideAllUI();
                document.getElementById('waiting-ui').classList.remove('hidden');
            }
            else if (status.state === 'playing') {
                // 如果已經在答這一題，不要重複刷新
                if (currentQ && currentQ.id === status.current_q_id && !document.getElementById('game-ui').classList.contains('hidden')) return;

                const { data: q } = await sbClient.from('questions').select('*').eq('id', status.current_q_id).single();
                if (myVersion !== stateVersion) return; // 已被更新的狀態取代，放棄
                if (q) {
                    currentQ = q;
                    hasAnswered = false;
                    currentSelection = 0;
                    startTime = Date.now();

                    hideAllUI();
                    document.getElementById('game-ui').classList.remove('hidden');
                    resetUI();
                    refreshUI(q);
                    startCountdown();
                }
            }
            else if (status.state === 'stopped') {
                stopCountdown();
                // 停止作答：未答題者自動提交
                if (!hasAnswered) {
                    processAnswer(currentSelection);
                }
            }
            else if (status.state === 'revealed') {
                stopCountdown();

                // 重新取得題目資料（含正確答案）
                const { data: revQ } = await sbClient.from('questions').select('*').eq('id', status.current_q_id).single();
                if (myVersion !== stateVersion) return; // 已被更新的狀態取代，放棄
                if (revQ) currentQ = revQ;

                // 同步刷新題目文字、題號與題目媒體（防止中途進場或重整時只有選項刷新）
                if (currentQ) refreshUI(currentQ);

                const correctAnswer = currentQ ? currentQ.answer : null;
                const myChoice = currentSelection;

                // 取得各選項作答人數
                let optCounts = { 1: 0, 2: 0, 3: 0, 4: 0 };
                const { data: revResponses } = await sbClient.from('responses').select('choice').eq('question_id', status.current_q_id);
                if (myVersion !== stateVersion) return; // 已被更新的狀態取代，放棄
                if (revResponses) {
                    revResponses.forEach(r => {
                        if (optCounts[r.choice] !== undefined) optCounts[r.choice]++;
                    });
                }

                // 顯示選項區塊，隱藏回饋訊息
                hideAllUI();
                document.getElementById('game-ui').classList.remove('hidden');
                document.getElementById('feedback').classList.add('hidden');
                document.getElementById('options-grid').classList.remove('hidden');
                document.getElementById('submit-btn').classList.add('hidden');

                // 隱藏倒數計時
                document.getElementById('countdown-container').classList.add('invisible');

                // 選項文字與人數
                const optTexts = { 1: currentQ.option_a, 2: currentQ.option_b, 3: currentQ.option_c, 4: currentQ.option_d };

                // 為每個選項上色 + 顯示人數
                for (let i = 1; i <= 4; i++) {
                    const btn = document.getElementById('opt' + i);
                    btn.disabled = true;
                    btn.classList.remove('selected-opt', 'dimmed-opt', 'grayscale');
                    Object.values(optOriginalBg).forEach(bg => btn.classList.remove(bg));
                    btn.classList.remove('correct-opt', 'incorrect-opt');

                    if (i === correctAnswer) {
                        btn.classList.add('correct-opt');
                    } else if (i === myChoice && myChoice !== correctAnswer && myChoice !== 0) {
                        btn.classList.add('incorrect-opt');
                    } else {
                        btn.classList.add('dimmed-opt');
                        if (optOriginalBg[i]) btn.classList.add(optOriginalBg[i]);
                    }

                    // 在選項上顯示人數
                    btn.innerHTML = `<span>${optTexts[i]}</span><span class="ml-2 text-lg opacity-80 bg-black/30 px-3 py-1 rounded-full">${optCounts[i]} 人</span>`;
                }

                // 顯示答案媒體（圖片與影片）
                const revealMedia = document.getElementById('reveal-media');
                const rImagesRow = document.getElementById('reveal-images-row');
                const rVideosCol = document.getElementById('reveal-videos-col');
                rImagesRow.innerHTML = ''; rVideosCol.innerHTML = '';
                let hasRevealMedia = false;
                if (currentQ) {
                    const ansImgUrls = (currentQ.answer_image_urls && currentQ.answer_image_urls.length) ? currentQ.answer_image_urls : (currentQ.answer_image_url ? [currentQ.answer_image_url] : []);
                    const ansVidUrls = (currentQ.answer_video_urls && currentQ.answer_video_urls.length) ? currentQ.answer_video_urls : (currentQ.answer_video_url ? [currentQ.answer_video_url] : []);
                    if (ansImgUrls.length) {
                        ansImgUrls.forEach(url => {
                            const img = document.createElement('img');
                            img.referrerPolicy = 'no-referrer';
                            img.crossOrigin = 'anonymous';
                            img.className = 'snap-center max-h-48 rounded-2xl border border-gold-700/30 shadow-lg cursor-zoom-in';
                            if (ansImgUrls.length === 1) img.className += ' mx-auto';
                            img.onclick = function() { openLightbox(this.src); };
                            img.onerror = function() {
                                this.onerror = null;
                                this.crossOrigin = null;
                                this.src = url;
                            };
                            img.src = url;
                            rImagesRow.appendChild(img);
                        });
                        hasRevealMedia = true;
                    }
                    if (ansVidUrls.length) {
                        ansVidUrls.forEach(url => {
                            const ytId = extractYouTubeId(url);
                            if (ytId) {
                                const div = document.createElement('div');
                                div.className = 'aspect-video w-full max-w-lg rounded-2xl overflow-hidden border border-gold-700/30 shadow-lg';
                                const iframe = document.createElement('iframe');
                                iframe.src = `https://www.youtube.com/embed/${ytId}`;
                                iframe.className = 'w-full h-full'; iframe.frameBorder = '0';
                                iframe.allow = 'autoplay; encrypted-media'; iframe.allowFullscreen = true;
                                div.appendChild(iframe);
                                rVideosCol.appendChild(div);
                            } else {
                                const vid = document.createElement('video');
                                vid.src = url; vid.controls = true;
                                vid.className = 'max-h-48 rounded-2xl border border-gold-700/30 shadow-lg w-full max-w-lg';
                                rVideosCol.appendChild(vid);
                            }
                        });
                        hasRevealMedia = true;
                    }
                }
                revealMedia.classList.toggle('hidden', !hasRevealMedia);

                // 顯示答案 Note 註記
                const revealNoteEl = document.getElementById('reveal-note');
                if (currentQ && currentQ.answer_note) {
                    document.getElementById('reveal-note-text').innerText = currentQ.answer_note;
                    revealNoteEl.classList.remove('hidden');
                } else {
                    revealNoteEl.classList.add('hidden');
                }
            }
            else if (status.state === 'scoring') {
                stopCountdown();
                hideAllUI();
                document.getElementById('scoring-ui').classList.remove('hidden');

                // 顯示/隱藏測試模式 badge
                document.getElementById('test-mode-badge').classList.toggle('hidden', currentMode !== 'test');

                // 顯示正確答案
                const scoringAnswer = document.getElementById('scoring-answer');
                const scoringAnswerText = document.getElementById('scoring-answer-text');
                if (currentQ && currentQ.answer) {
                    const answerMap = { 1: 'A', 2: 'B', 3: 'C', 4: 'D' };
                    const optionMap = { 1: currentQ.option_a, 2: currentQ.option_b, 3: currentQ.option_c, 4: currentQ.option_d };
                    const ansNum = currentQ.answer;
                    scoringAnswerText.innerText = `${answerMap[ansNum]}. ${optionMap[ansNum]}`;
                    scoringAnswer.classList.remove('hidden');
                } else {
                    scoringAnswer.classList.add('hidden');
                }

                // 顯示答案媒體（多媒體）
                const scoringMedia = document.getElementById('scoring-media');
                const sImagesRow = document.getElementById('scoring-images-row');
                const sVideosCol = document.getElementById('scoring-videos-col');
                sImagesRow.innerHTML = ''; sVideosCol.innerHTML = '';
                let hasAnswerMedia = false;
                if (currentQ) {
                    const ansImgUrls = (currentQ.answer_image_urls && currentQ.answer_image_urls.length) ? currentQ.answer_image_urls : (currentQ.answer_image_url ? [currentQ.answer_image_url] : []);
                    const ansVidUrls = (currentQ.answer_video_urls && currentQ.answer_video_urls.length) ? currentQ.answer_video_urls : (currentQ.answer_video_url ? [currentQ.answer_video_url] : []);
                    if (ansImgUrls.length) {
                        ansImgUrls.forEach(url => {
                            const img = document.createElement('img');
                            img.referrerPolicy = 'no-referrer';
                            img.crossOrigin = 'anonymous';
                            img.className = 'snap-center max-h-48 rounded-2xl border border-gold-700/30 shadow-lg cursor-zoom-in';
                            if (ansImgUrls.length === 1) img.className += ' mx-auto';
                            img.onclick = function() { openLightbox(this.src); };
                            img.onerror = function() {
                                this.onerror = null;
                                this.crossOrigin = null;
                                this.src = url;
                            };
                            img.src = url;
                            sImagesRow.appendChild(img);
                        });
                        hasAnswerMedia = true;
                    }
                    if (ansVidUrls.length) {
                        ansVidUrls.forEach(url => {
                            const ytId = extractYouTubeId(url);
                            if (ytId) {
                                const div = document.createElement('div');
                                div.className = 'aspect-video w-full max-w-lg rounded-2xl overflow-hidden border border-gold-700/30 shadow-lg';
                                const iframe = document.createElement('iframe');
                                iframe.src = `https://www.youtube.com/embed/${ytId}`;
                                iframe.className = 'w-full h-full'; iframe.frameBorder = '0';
                                iframe.allow = 'autoplay; encrypted-media'; iframe.allowFullscreen = true;
                                div.appendChild(iframe);
                                sVideosCol.appendChild(div);
                            } else {
                                const vid = document.createElement('video');
                                vid.src = url; vid.controls = true;
                                vid.className = 'max-h-48 rounded-2xl border border-gold-700/30 shadow-lg w-full max-w-lg';
                                sVideosCol.appendChild(vid);
                            }
                        });
                        hasAnswerMedia = true;
                    }
                }
                scoringMedia.classList.toggle('hidden', !hasAnswerMedia);

                // 顯示答案 Note 註記
                const scoringNoteEl = document.getElementById('scoring-note');
                if (currentQ && currentQ.answer_note) {
                    document.getElementById('scoring-note-text').innerText = currentQ.answer_note;
                    scoringNoteEl.classList.remove('hidden');
                } else {
                    scoringNoteEl.classList.add('hidden');
                }

                // 取得本題積分與累計積分
                const { data: myResponse } = await sbClient.from('responses').select('scored_points').eq('player_name', myName).eq('question_id', status.current_q_id).single();
                const questionScore = myResponse ? myResponse.scored_points : 0;
                document.getElementById('scoring-question-score').innerText = `${questionScore} 分`;

                const scoreField = currentMode === 'test' ? 'test_score' : 'score';
                const { data: myPlayer } = await sbClient.from('players').select(scoreField).eq('name', myName).single();
                const totalScore = myPlayer ? myPlayer[scoreField] : 0;
                document.getElementById('scoring-total-score').innerText = `${totalScore} 分`;
            }
            else if (status.state === 'ended') {
                hideAllUI();
                document.getElementById('end-ui').classList.remove('hidden');

                // 取得排行榜並顯示分數與名次
                const scoreField = currentMode === 'test' ? 'test_score' : 'score';
                const { data: allPlayers } = await sbClient.from('players').select('*').order(scoreField, { ascending: false });
                if (allPlayers) {
                    const myRank = allPlayers.findIndex(p => p.name === myName) + 1;
                    const myData = allPlayers.find(p => p.name === myName);
                    const myScore = myData ? myData[scoreField] : 0;
                    const crownIcons = { 1: '👑', 2: '👑', 3: '👑' };
                    const crown = crownIcons[myRank] || '';
                    document.getElementById('end-rank').innerHTML = crown ? `${crown} 第 ${myRank} 名 ${crown}` : `第 ${myRank} 名`;
                    document.getElementById('end-score').innerText = `得分：${myScore} 分`;

                    // 前三名排行榜 + 自己的名次（如果不在前三）
                    const rankEmojis = ['🥇', '🥈', '🥉'];
                    let top3Html = '';
                    const top3 = allPlayers.slice(0, 3);
                    top3.forEach((p, i) => {
                        const isMe = p.name === myName;
                        const meBorder = isMe ? ' ring-2 ring-gold-400/70' : '';
                        const bg = 'bg-gradient-to-r from-gold-500/25 to-gold-700/20 border border-gold-500/40';
                        top3Html += `<div class="flex items-center justify-between px-6 py-3 rounded-xl ${bg}${meBorder}">
                            <span class="text-2xl font-bold text-gold-100">${rankEmojis[i]} ${p.name}${isMe ? '（你）' : ''}</span>
                            <span class="text-2xl font-black text-gold-300">${p[scoreField]} 分</span>
                        </div>`;
                    });
                    // 如果自己不在前三名，額外顯示自己的排名
                    if (myRank > 3) {
                        top3Html += `<div class="border-t border-gold-500/20 pt-3 mt-1"></div>`;
                        top3Html += `<div class="flex items-center justify-between px-6 py-3 rounded-xl bg-[#1e3350]/60 border border-gold-700/15 ring-2 ring-gold-400/70">
                            <span class="text-2xl font-bold text-gold-100">#${myRank} ${myName}（你）</span>
                            <span class="text-2xl font-black text-gold-300">${myScore} 分</span>
                        </div>`;
                    }
                    document.getElementById('end-top3').innerHTML = top3Html;
                }

                confetti({ particleCount: 400, spread: 120, origin: { y: 0.4 }, colors: ['#fbbf24', '#ffffff'] });
            }
            else if (status.state === 'dismissed') {
                // 被踢回首頁：清除狀態，回到輸入暱稱畫面
                sessionStorage.removeItem('quiz_player_name');
                hideAllUI();
                if (channel) { sbClient.removeChannel(channel); channel = null; }
                if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
                stopCountdown();
                myName = '';
                currentQ = null;
                hasAnswered = false;
                currentSelection = 0;
                lastProcessedKey = '';
                document.getElementById('p-name').value = '';
                document.getElementById('login-ui').classList.remove('hidden');
                document.getElementById('sync-btn').classList.add('hidden');
            }
        }

        function resetUI() {
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('options-grid').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.querySelectorAll('.option-btn').forEach((btn, idx) => {
                btn.disabled = false;
                btn.classList.remove('grayscale', 'selected-opt', 'dimmed-opt', 'correct-opt', 'incorrect-opt');
                const bg = optOriginalBg[idx + 1];
                if (bg && !btn.classList.contains(bg)) btn.classList.add(bg);
            });
            // 隱藏公布答案媒體與註記
            document.getElementById('reveal-media').classList.add('hidden');
            document.getElementById('reveal-note').classList.add('hidden');
            // Reset countdown display
            document.getElementById('countdown-container').classList.remove('invisible');
            document.getElementById('countdown-text').innerText = '15.0';
            document.getElementById('countdown-text').classList.remove('text-red-400');
            document.getElementById('countdown-text').classList.add('text-gold-300');
            const circleEl = document.getElementById('countdown-circle');
            circleEl.setAttribute('stroke-dashoffset', '0');
            circleEl.setAttribute('stroke', '#ffaa1d');
        }

        function refreshUI(q) {
            const filteredByMode = questionIdOrder.filter(x => (x.type || 'official') === currentMode);
            const qNum = filteredByMode.findIndex(x => x.id === q.id) + 1 || q.id;
            document.getElementById('q-category').innerText = `Question ${qNum}`;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('opt1').innerText = q.option_a;
            document.getElementById('opt2').innerText = q.option_b;
            document.getElementById('opt3').innerText = q.option_c;
            document.getElementById('opt4').innerText = q.option_d;

            // 題目媒體：顯示題目圖片給玩家（比照 admin）
            const qMedia = document.getElementById('q-media');
            const qImagesRow = document.getElementById('q-images-row');
            const qVideosCol = document.getElementById('q-videos-col');
            qImagesRow.innerHTML = ''; qVideosCol.innerHTML = '';
            qImagesRow.classList.add('hidden'); qVideosCol.classList.add('hidden');
            let hasQMedia = false;
            const qImgUrls = (q.image_urls && q.image_urls.length) ? q.image_urls : (q.image_url ? [q.image_url] : []);
            if (qImgUrls.length) {
                qImgUrls.forEach(url => {
                    const img = document.createElement('img');
                    img.referrerPolicy = 'no-referrer';
                    img.crossOrigin = 'anonymous';
                    img.className = 'rounded-xl max-h-60 snap-center';
                    img.onerror = function() {
                        this.onerror = null;
                        this.crossOrigin = null;
                        this.src = url;
                    };
                    img.src = url;
                    qImagesRow.appendChild(img);
                });
                qImagesRow.classList.remove('hidden');
                hasQMedia = true;
            }
            qMedia.classList.toggle('hidden', !hasQMedia);
        }

        const optOriginalBg = { 1: 'bg-blue-900', 2: 'bg-indigo-900', 3: 'bg-sky-900', 4: 'bg-cyan-900' };
        function selectOption(choice) {
            if (hasAnswered) return;
            currentSelection = choice;
            for (let i = 1; i <= 4; i++) {
                const btn = document.getElementById('opt' + i);
                if (i === choice) {
                    btn.classList.add('selected-opt');
                    btn.classList.remove('dimmed-opt', optOriginalBg[i]);
                } else {
                    btn.classList.remove('selected-opt');
                    btn.classList.add('dimmed-opt');
                    if (!btn.classList.contains(optOriginalBg[i])) btn.classList.add(optOriginalBg[i]);
                }
            }
            document.getElementById('submit-btn').classList.remove('hidden');
        }

        function submitAnswer() {
            if (currentSelection === 0 || hasAnswered) return;
            processAnswer(currentSelection);
        }

        async function processAnswer(choice) {
            if (hasAnswered) return;
            hasAnswered = true;
            stopCountdown();
            document.getElementById('submit-btn').classList.add('hidden');
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

            const elapsedMs = startTime ? Date.now() - startTime : 0;

            // 透過 RPC 提交答案（RLS 保護）
            sbClient.rpc('submit_response', {
                p_player_name: myName,
                p_question_id: currentQ.id,
                p_choice: choice,
                p_response_time_ms: elapsedMs,
                p_qr_token: qrToken
            }).then();

            if (choice === 0) {
                showFeedback('未作答，已自動提交');
            } else {
                showFeedback('已成功提交！');
            }
        }

        function showFeedback(msg) {
            const fb = document.getElementById('feedback');
            document.getElementById('options-grid').classList.add('hidden');
            fb.innerText = msg;
            fb.classList.remove('hidden');
            fb.className = "text-center p-8 rounded-3xl text-3xl font-black bg-midnight-900/50 text-gold-200 border-2 border-gold-600 block mt-6";
        }

        function exitGame() {
            if (!confirm('確定要退出遊戲嗎？')) return;
            sessionStorage.removeItem('quiz_player_name');
            hideAllUI();
            if (channel) { sbClient.removeChannel(channel); channel = null; }
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
            stopCountdown();
            myName = '';
            currentQ = null;
            hasAnswered = false;
            currentSelection = 0;
            lastProcessedKey = '';
            document.getElementById('p-name').value = '';
            document.getElementById('login-ui').classList.remove('hidden');
            document.getElementById('sync-btn').classList.add('hidden');
        }

        // 手動同步：強制重新取得當前題目狀態
        async function manualRefresh() {
            const btn = document.getElementById('sync-btn');
            if (btn.classList.contains('syncing')) return; // 防止連點
            btn.classList.add('syncing');

            try {
                const { data } = await sbClient.from('game_status').select('*').eq('id', 1).single();
                if (data) {
                    // 強制重新處理（清除 lastProcessedKey 讓 handleStateChange 執行）
                    lastProcessedKey = '';
                    handleStateChange(data);
                }
            } catch (e) {
                console.error('手動同步失敗:', e);
            }

            // 動畫結束後移除 syncing class
            setTimeout(() => btn.classList.remove('syncing'), 600);
        }

    </script>

    <script src="js/shared.js"></script>
</body>
