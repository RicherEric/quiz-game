<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滙智 10 週年互動問答</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 50: '#fff9eb', 100: '#ffedc6', 200: '#ffda88', 300: '#ffc24a', 400: '#ffaa1d', 500: '#f98c00', 600: '#e47000', 700: '#bb5200', 800: '#964000', 900: '#7c3500', 950: '#461b00' },
                        midnight: { 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        .option-btn {
            @apply w-full py-8 text-3xl font-bold text-white rounded-2xl shadow-lg transform transition-all active:scale-95 disabled:grayscale-[0.5] disabled:opacity-50;
        }

        .selected-opt {
            @apply ring-4 ring-gold-400 scale-95 shadow-[0_0_20px_rgba(251, 191, 36, 0.5)];
        }

        .dimmed-opt {
            @apply opacity-50 saturate-50;
        }

        .text-gold-gradient {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-gold-200 to-gold-500;
        }

        .countdown-ring {
            transform: rotate(-90deg);
        }

        .countdown-ring circle {
            transition: stroke-dashoffset 0.1s linear;
        }

        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slide-up 0.3s ease-out;
        }
    </style>
</head>

<body class="bg-midnight-950 text-gold-100 font-sans min-h-screen">
    <div id="app" class="max-w-3xl mx-auto p-6">

        <div id="no-token-ui" class="hidden text-center mt-16 space-y-8">
            <div class="flex flex-col items-center justify-center space-y-6">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-32 md:h-40 drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
                <h1 class="text-5xl md:text-6xl font-black text-gold-gradient tracking-tight drop-shadow-lg">滙智 10 週年挑戰賽
                </h1>
            </div>
            <div class="bg-midnight-900/50 p-8 rounded-3xl border border-gold-700/30 shadow-2xl backdrop-blur-sm">
                <p class="text-3xl text-gold-200 font-bold mb-4">請掃描 QR Code 加入遊戲</p>
                <p class="text-xl text-gold-300/80">請在主持人的螢幕上掃描 QR Code 來參與挑戰</p>
            </div>
        </div>

        <div id="login-ui" class="text-center mt-16 space-y-8">
            <div class="flex flex-col items-center justify-center space-y-6">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-32 md:h-40 drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
                <h1 class="text-5xl md:text-6xl font-black text-gold-gradient tracking-tight drop-shadow-lg">滙智 10 週年挑戰賽
                </h1>
            </div>
            <div class="bg-midnight-900/50 p-8 rounded-3xl border border-gold-700/30 shadow-2xl backdrop-blur-sm">
                <input id="p-name" type="text" placeholder="請輸入您的暱稱"
                    class="w-full p-5 rounded-2xl text-midnight-950 text-2xl text-center focus:ring-4 focus:ring-gold-500 outline-none shadow-inner bg-gold-100 placeholder-gold-800/50 font-bold border-2 border-gold-600/50">
                <p class="mt-3 text-gold-300/80 text-base">請輸入您的暱稱，相同的暱稱只能輸入一次，請謹慎輸入完再送出</p>
                <button onclick="join()"
                    class="w-full mt-6 bg-gradient-to-r from-gold-500 to-gold-700 py-5 rounded-2xl text-3xl font-black shadow-[0_0_25px_rgba(251,191,36,0.4)] text-midnight-950">登入挑戰</button>
            </div>
        </div>

        <div id="waiting-ui" class="hidden text-center mt-32 space-y-10">
            <div class="bg-midnight-900/60 p-10 rounded-3xl border-2 border-gold-600/40 shadow-2xl backdrop-blur-md">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-gold-400 mx-auto mb-6"></div>
                <h2 class="text-4xl font-bold text-gold-100 mb-4">哈囉，<span id="user-display"
                        class="text-gold-gradient"></span></h2>
                <p class="text-2xl text-gold-200/80 leading-relaxed">請看大螢幕，<br>等待主持人開放作答...</p>
            </div>
        </div>

        <div id="scoring-ui" class="hidden text-center mt-16 space-y-6">
            <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                class="h-28 mx-auto drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
            <p class="text-3xl text-gold-200 font-bold">本題結算完成</p>

            <!-- 答案媒體（多媒體） -->
            <div id="scoring-media" class="hidden space-y-3">
                <div id="scoring-images-row" class="flex overflow-x-auto snap-x gap-3 justify-center"></div>
                <div id="scoring-videos-col" class="space-y-3 flex flex-col items-center"></div>
            </div>

            <!-- 本題積分 -->
            <div class="bg-midnight-900/50 px-8 py-6 rounded-2xl border border-gold-700/30">
                <p class="text-lg text-gold-300/70 mb-1">您本題獲得的積分</p>
                <div id="scoring-question-score" class="text-4xl font-black text-gold-200"></div>
            </div>

            <!-- 累計積分 -->
            <div class="bg-midnight-900/60 px-8 py-8 rounded-3xl border-2 border-gold-600/40 shadow-[0_0_30px_rgba(251,191,36,0.1)]">
                <p class="text-lg text-gold-300/70 mb-2">您的累計積分</p>
                <div id="scoring-total-score" class="text-6xl font-black text-gold-gradient"></div>
            </div>

            <!-- 等待提示 -->
            <div class="flex items-center justify-center gap-4 pt-2">
                <div class="animate-spin rounded-full h-8 w-8 border-b-3 border-gold-400"></div>
                <p class="text-xl text-gold-200/50">等待主持人進入下一題...</p>
            </div>
        </div>

        <div id="game-ui" class="hidden space-y-6">
            <div
                class="flex justify-center items-center bg-midnight-900/70 p-5 rounded-3xl border-2 border-gold-600/40">
                <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                    class="h-12 opacity-80">
            </div>

            <div class="py-6 text-center space-y-4 bg-midnight-900/40 rounded-3xl p-6 border border-gold-800/30">
                <div class="flex items-center justify-between">
                    <div id="q-category"
                        class="text-lg text-gold-300 font-bold uppercase bg-midnight-800/80 px-6 py-2 rounded-full border-2 border-gold-600/50 inline-block">
                        Question</div>
                    <div id="countdown-container" class="relative flex items-center justify-center">
                        <svg class="countdown-ring" width="64" height="64" viewBox="0 0 64 64">
                            <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(187,82,0,0.3)" stroke-width="5" />
                            <circle id="countdown-circle" cx="32" cy="32" r="28" fill="none" stroke="#ffaa1d"
                                stroke-width="5" stroke-linecap="round" stroke-dasharray="175.93"
                                stroke-dashoffset="0" />
                        </svg>
                        <span id="countdown-text" class="absolute text-xl font-black text-gold-300">15.0</span>
                    </div>
                </div>
                <h2 id="q-text" class="text-4xl md:text-5xl font-bold leading-tight text-gold-100">載入中...</h2>

                <!-- 題目媒體（多媒體） -->
                <div id="q-media" class="hidden mt-4 space-y-3">
                    <div id="q-images-row" class="flex overflow-x-auto snap-x gap-3 justify-center"></div>
                    <div id="q-videos-col" class="space-y-3 flex flex-col items-center"></div>
                </div>
            </div>

            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <button onclick="selectOption(1)" id="opt1"
                    class="option-btn bg-blue-900 border-2 border-gold-600/50 text-2xl font-bold py-4">A</button>

                <button onclick="selectOption(2)" id="opt2"
                    class="option-btn bg-indigo-900 border-2 border-gold-600/50 text-2xl font-bold py-4">B</button>

                <button onclick="selectOption(3)" id="opt3"
                    class="option-btn bg-sky-900 border-2 border-gold-600/50 text-2xl font-bold py-4">C</button>

                <button onclick="selectOption(4)" id="opt4"
                    class="option-btn bg-cyan-900 border-2 border-gold-600/50 text-2xl font-bold py-4">D</button>
            </div>

            <button id="submit-btn" onclick="submitAnswer()"
                class="w-full mt-6 py-5 bg-gradient-to-r from-gold-500 to-gold-700 text-midnight-950 rounded-2xl text-3xl font-black hidden shadow-lg">確認送出</button>
            <div id="feedback" class="hidden text-center p-6 rounded-2xl text-3xl font-black mt-6 shadow-2xl"></div>
        </div>

        <div id="end-ui" class="hidden text-center mt-20 space-y-8">
            <img src="https://wisdom-financial.com/dist/images/10th/W10_WGHL.png" alt="Logo"
                class="h-32 mx-auto drop-shadow-[0_0_20px_rgba(251,191,36,0.4)]">
            <h1 class="text-6xl font-black text-gold-gradient">挑戰結束！</h1>
            <!-- 自己的名次與分數 -->
            <div class="bg-midnight-900/60 p-10 rounded-[3rem] border-4 border-gold-600/40 space-y-4">
                <div id="end-rank" class="text-5xl font-black text-gold-300"></div>
                <div id="end-score" class="text-3xl text-gold-200 font-bold"></div>
            </div>
            <!-- 前三名排行榜 -->
            <div class="bg-midnight-900/60 p-8 rounded-[3rem] border-4 border-gold-600/40 space-y-4">
                <h2 class="text-3xl font-black text-gold-300">🏆 排行榜</h2>
                <div id="end-top3" class="space-y-3"></div>
            </div>
            <p class="text-xl text-gold-200/60">感謝您的參與！</p>
        </div>

        <!-- 中獎紀錄 Modal -->
        <div id="winners-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeWinnersModal()"></div>
            <div class="relative w-full max-w-3xl bg-midnight-900 border-t-2 border-gold-600/50 rounded-t-3xl shadow-2xl max-h-[85vh] flex flex-col animate-slide-up">
                <div class="flex items-center justify-between px-6 py-4 border-b border-gold-700/30">
                    <h2 class="text-2xl font-bold text-gold-100">🏆 中獎紀錄</h2>
                    <button onclick="closeWinnersModal()" class="text-gold-400 hover:text-gold-200 text-2xl font-bold px-2">✕</button>
                </div>
                <div id="winners-modal-content" class="overflow-y-auto p-6 space-y-4">
                    <div class="text-gold-400/50 text-center py-10">載入中...</div>
                </div>
            </div>
        </div>

        <!-- 中獎紀錄浮動按鈕 -->
        <button id="winners-fab" class="hidden fixed bottom-6 right-6 z-40 bg-gradient-to-r from-gold-500 to-gold-700 text-midnight-950 font-black text-lg px-5 py-3 rounded-2xl shadow-[0_0_20px_rgba(251,191,36,0.4)] hover:shadow-[0_0_30px_rgba(251,191,36,0.6)] transition-all active:scale-95"
            onclick="openWinnersModal()">
            🏆 中獎紀錄
        </button>
    </div>

    <script>
        const SUPABASE_URL = "https://jwwhkbxgcbasmgkgmrvl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3d2hrYnhnY2Jhc21na2dtcnZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEzODYsImV4cCI6MjA4ODI0NzM4Nn0.B_9hBrm8aUO6lGmyCCyBdSU49Xv2EPLGOnjet1Lf8jE";

        let sbClient, myName = "", currentQ = null, startTime = 0, hasAnswered = false, currentSelection = 0, channel = null, lastProcessedKey = '', pollInterval = null, questionIdOrder = [], qrToken = null;
        let countdownTimer = null;
        const COUNTDOWN_TOTAL = 15000; // 15 seconds in ms
        const COUNTDOWN_CIRCUMFERENCE = 2 * Math.PI * 28; // ~175.93

        window.onload = async () => {
            if (!window.supabase) {
                alert("網路不穩定，通訊元件載入失敗，請重新整理網頁");
                return;
            }
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // 檢查 URL 是否有 QR token
            const urlParams = new URLSearchParams(window.location.search);
            qrToken = urlParams.get('token');

            if (!qrToken) {
                // 沒有 token → 顯示「請掃描 QR Code」提示
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('no-token-ui').classList.remove('hidden');
                return;
            }

            // 有 token → 匿名登入
            const { data: { session } } = await sbClient.auth.getSession();
            if (!session) {
                const { error } = await sbClient.auth.signInAnonymously();
                if (error) {
                    alert("認證失敗，請重新掃描 QR Code");
                    console.error("Anonymous sign-in error:", error);
                    return;
                }
            }
            console.log("Supabase 初始化成功，已匿名登入");
        };

        async function join() {
            myName = document.getElementById('p-name').value.trim();
            if (!myName) return alert("請輸入名字");

            // 透過 RPC 驗證 QR token 並加入遊戲
            const { data, error } = await sbClient.rpc('join_via_qr', {
                qr_token: qrToken,
                player_name: myName
            });
            if (error) {
                console.error("join_via_qr error:", error);
                if (error.message && error.message.includes('Invalid QR token')) {
                    return alert("無效的 QR Code，請重新掃描！");
                }
                if (error.message && (error.message.includes('duplicate') || error.message.includes('already') || error.message.includes('unique') || error.message.includes('已存在') || error.message.includes('暱稱'))) {
                    return alert("此暱稱已被使用，請換一個暱稱再試！");
                }
                return alert("加入失敗：" + (error.message || "未知錯誤"));
            }

            // 載入題目 ID 順序，用於顯示題號
            const { data: qList } = await sbClient.from('questions').select('id, sort_order').order('sort_order', { ascending: true }).order('id', { ascending: true });
            questionIdOrder = (qList || []).map(q => q.id);

            document.getElementById('user-display').innerText = myName;
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('waiting-ui').classList.remove('hidden');

            listenToHost();
        }

        function listenToHost() {
            checkCurrentStatus(); // 處理中途進場

            if (channel) sbClient.removeChannel(channel);

            channel = sbClient.channel('quiz-control')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'game_status',
                    filter: 'id=eq.1'
                }, (payload) => {
                    console.log("偵測到主持人指令:", payload.new.state);
                    const key = `${payload.new.state}_${payload.new.current_q_id}_${payload.new.start_time}`;
                    lastProcessedKey = key;
                    handleStateChange(payload.new);
                })
                .subscribe((status) => {
                    console.log("廣播連線狀態:", status);
                });

            // 輪詢備援：每 2 秒檢查一次，防止即時連線漏接
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(checkCurrentStatus, 2000);
        }

        async function checkCurrentStatus() {
            const { data } = await sbClient.from('game_status').select('*').eq('id', 1).single();
            if (data) {
                const key = `${data.state}_${data.current_q_id}_${data.start_time}`;
                if (key !== lastProcessedKey) {
                    lastProcessedKey = key;
                    handleStateChange(data);
                }
            }
        }

        function hideAllUI() {
            ['waiting-ui', 'game-ui', 'scoring-ui', 'end-ui'].forEach(id =>
                document.getElementById(id).classList.add('hidden')
            );
        }

        function startCountdown() {
            stopCountdown();
            const countdownStart = Date.now();
            const textEl = document.getElementById('countdown-text');
            const circleEl = document.getElementById('countdown-circle');

            countdownTimer = setInterval(() => {
                const elapsed = Date.now() - countdownStart;
                const remaining = Math.max(0, COUNTDOWN_TOTAL - elapsed);
                const seconds = (remaining / 1000).toFixed(1);

                textEl.innerText = seconds;
                // Update ring: full circle = 0 offset, empty = full circumference
                const offset = COUNTDOWN_CIRCUMFERENCE * (1 - remaining / COUNTDOWN_TOTAL);
                circleEl.setAttribute('stroke-dashoffset', offset);

                // Color transition: gold -> red as time runs out
                if (remaining < 5000) {
                    circleEl.setAttribute('stroke', '#ef4444');
                    textEl.classList.remove('text-gold-300');
                    textEl.classList.add('text-red-400');
                } else {
                    circleEl.setAttribute('stroke', '#ffaa1d');
                    textEl.classList.remove('text-red-400');
                    textEl.classList.add('text-gold-300');
                }

                if (remaining <= 0) {
                    stopCountdown();
                    if (!hasAnswered) {
                        // Auto-submit: send current selection (or 0 if nothing selected)
                        processAnswer(currentSelection);
                    }
                }
            }, 100);
        }

        function stopCountdown() {
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        async function handleStateChange(status) {
            if (status.state === 'waiting') {
                hideAllUI();
                document.getElementById('waiting-ui').classList.remove('hidden');
                showWinnersFab();
            }
            else if (status.state === 'playing') {
                // 如果已經在答這一題，不要重複刷新
                if (currentQ && currentQ.id === status.current_q_id && !document.getElementById('game-ui').classList.contains('hidden')) return;

                const { data: q } = await sbClient.from('questions').select('*').eq('id', status.current_q_id).single();
                if (q) {
                    currentQ = q;
                    hasAnswered = false;
                    currentSelection = 0;
                    startTime = Date.now();

                    hideAllUI();
                    hideWinnersFab();
                    closeWinnersModal();
                    document.getElementById('game-ui').classList.remove('hidden');
                    resetUI();
                    refreshUI(q);
                    startCountdown();
                }
            }
            else if (status.state === 'stopped') {
                stopCountdown();
                showWinnersFab();
                // 停止作答：未答題者自動提交
                if (!hasAnswered) {
                    processAnswer(currentSelection);
                }
            }
            else if (status.state === 'scoring') {
                stopCountdown();
                hideAllUI();
                document.getElementById('scoring-ui').classList.remove('hidden');
                showWinnersFab();

                // 顯示答案媒體（多媒體）
                const scoringMedia = document.getElementById('scoring-media');
                const sImagesRow = document.getElementById('scoring-images-row');
                const sVideosCol = document.getElementById('scoring-videos-col');
                sImagesRow.innerHTML = ''; sVideosCol.innerHTML = '';
                let hasAnswerMedia = false;
                if (currentQ) {
                    const ansImgUrls = (currentQ.answer_image_urls && currentQ.answer_image_urls.length) ? currentQ.answer_image_urls : (currentQ.answer_image_url ? [currentQ.answer_image_url] : []);
                    const ansVidUrls = (currentQ.answer_video_urls && currentQ.answer_video_urls.length) ? currentQ.answer_video_urls : (currentQ.answer_video_url ? [currentQ.answer_video_url] : []);
                    if (ansImgUrls.length) {
                        ansImgUrls.forEach(url => {
                            const img = document.createElement('img');
                            img.src = url;
                            img.className = 'snap-center max-h-48 rounded-2xl border border-gold-700/30 shadow-lg';
                            if (ansImgUrls.length === 1) img.className += ' mx-auto';
                            sImagesRow.appendChild(img);
                        });
                        hasAnswerMedia = true;
                    }
                    if (ansVidUrls.length) {
                        ansVidUrls.forEach(url => {
                            const ytId = extractYouTubeId(url);
                            if (ytId) {
                                const div = document.createElement('div');
                                div.className = 'aspect-video w-full max-w-lg rounded-2xl overflow-hidden border border-gold-700/30 shadow-lg';
                                const iframe = document.createElement('iframe');
                                iframe.src = `https://www.youtube.com/embed/${ytId}`;
                                iframe.className = 'w-full h-full'; iframe.frameBorder = '0';
                                iframe.allow = 'autoplay; encrypted-media'; iframe.allowFullscreen = true;
                                div.appendChild(iframe);
                                sVideosCol.appendChild(div);
                            } else {
                                const vid = document.createElement('video');
                                vid.src = url; vid.controls = true;
                                vid.className = 'max-h-48 rounded-2xl border border-gold-700/30 shadow-lg w-full max-w-lg';
                                sVideosCol.appendChild(vid);
                            }
                        });
                        hasAnswerMedia = true;
                    }
                }
                scoringMedia.classList.toggle('hidden', !hasAnswerMedia);

                // 取得本題積分與累計積分
                const { data: myResponse } = await sbClient.from('responses').select('scored_points').eq('player_name', myName).eq('question_id', status.current_q_id).single();
                const questionScore = myResponse ? myResponse.scored_points : 0;
                document.getElementById('scoring-question-score').innerText = `${questionScore} 分`;

                const { data: myPlayer } = await sbClient.from('players').select('score').eq('name', myName).single();
                const totalScore = myPlayer ? myPlayer.score : 0;
                document.getElementById('scoring-total-score').innerText = `${totalScore} 分`;
            }
            else if (status.state === 'ended') {
                hideAllUI();
                document.getElementById('end-ui').classList.remove('hidden');
                showWinnersFab();

                // 取得排行榜並顯示分數與名次
                const { data: allPlayers } = await sbClient.from('players').select('*').order('score', { ascending: false });
                if (allPlayers) {
                    const myRank = allPlayers.findIndex(p => p.name === myName) + 1;
                    const myData = allPlayers.find(p => p.name === myName);
                    const myScore = myData ? myData.score : 0;
                    const crownIcons = { 1: '👑', 2: '👑', 3: '👑' };
                    const crown = crownIcons[myRank] || '';
                    document.getElementById('end-rank').innerHTML = crown ? `${crown} 第 ${myRank} 名 ${crown}` : `第 ${myRank} 名`;
                    document.getElementById('end-score').innerText = `得分：${myScore} 分`;

                    // 前三名排行榜 + 自己的名次（如果不在前三）
                    const rankEmojis = ['🥇', '🥈', '🥉'];
                    let top3Html = '';
                    const top3 = allPlayers.slice(0, 3);
                    top3.forEach((p, i) => {
                        const isMe = p.name === myName;
                        const highlight = isMe ? 'bg-gold-500/20 border border-gold-400/60' : '';
                        top3Html += `<div class="flex items-center justify-between px-6 py-3 rounded-2xl ${highlight}">
                            <span class="text-2xl font-bold text-gold-200">${rankEmojis[i]} ${p.name}${isMe ? '（你）' : ''}</span>
                            <span class="text-2xl font-black text-gold-300">${p.score} 分</span>
                        </div>`;
                    });
                    // 如果自己不在前三名，額外顯示自己的排名
                    if (myRank > 3) {
                        top3Html += `<div class="border-t border-gold-600/30 pt-3 mt-1"></div>`;
                        top3Html += `<div class="flex items-center justify-between px-6 py-3 rounded-2xl bg-gold-500/20 border border-gold-400/60">
                            <span class="text-2xl font-bold text-gold-200">#${myRank} ${myName}（你）</span>
                            <span class="text-2xl font-black text-gold-300">${myScore} 分</span>
                        </div>`;
                    }
                    document.getElementById('end-top3').innerHTML = top3Html;
                }

                confetti({ particleCount: 400, spread: 120, origin: { y: 0.4 }, colors: ['#fbbf24', '#ffffff'] });
            }
            else if (status.state === 'dismissed') {
                // 被踢回首頁：清除狀態，回到輸入暱稱畫面
                hideAllUI();
                hideWinnersFab();
                closeWinnersModal();
                if (channel) { sbClient.removeChannel(channel); channel = null; }
                if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
                stopCountdown();
                myName = '';
                currentQ = null;
                hasAnswered = false;
                currentSelection = 0;
                lastProcessedKey = '';
                document.getElementById('p-name').value = '';
                document.getElementById('login-ui').classList.remove('hidden');
            }
        }

        function resetUI() {
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('options-grid').classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('grayscale', 'selected-opt', 'dimmed-opt');
            });
            // Reset countdown display
            document.getElementById('countdown-text').innerText = '15.0';
            document.getElementById('countdown-text').classList.remove('text-red-400');
            document.getElementById('countdown-text').classList.add('text-gold-300');
            const circleEl = document.getElementById('countdown-circle');
            circleEl.setAttribute('stroke-dashoffset', '0');
            circleEl.setAttribute('stroke', '#ffaa1d');
        }

        function extractYouTubeId(url) {
            if (!url) return null;
            const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
            return m ? m[1] : null;
        }

        function refreshUI(q) {
            const qNum = questionIdOrder.indexOf(q.id) + 1 || q.id;
            document.getElementById('q-category').innerText = `Question ${qNum}`;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('opt1').innerText = q.option_a;
            document.getElementById('opt2').innerText = q.option_b;
            document.getElementById('opt3').innerText = q.option_c;
            document.getElementById('opt4').innerText = q.option_d;

            // 顯示媒體（多媒體）
            const mediaContainer = document.getElementById('q-media');
            const imagesRow = document.getElementById('q-images-row');
            const videosCol = document.getElementById('q-videos-col');
            imagesRow.innerHTML = ''; videosCol.innerHTML = '';
            const imgUrls = (q.image_urls && q.image_urls.length) ? q.image_urls : (q.image_url ? [q.image_url] : []);
            const vidUrls = (q.video_urls && q.video_urls.length) ? q.video_urls : (q.video_url ? [q.video_url] : []);
            let hasMedia = false;
            if (imgUrls.length) {
                imgUrls.forEach(url => {
                    const img = document.createElement('img');
                    img.src = url;
                    img.className = 'snap-center max-h-60 rounded-2xl border border-gold-700/30 shadow-lg';
                    if (imgUrls.length === 1) img.className += ' mx-auto';
                    imagesRow.appendChild(img);
                });
                hasMedia = true;
            }
            if (vidUrls.length) {
                vidUrls.forEach(url => {
                    const ytId = extractYouTubeId(url);
                    if (ytId) {
                        const div = document.createElement('div');
                        div.className = 'aspect-video w-full max-w-lg rounded-2xl overflow-hidden border border-gold-700/30 shadow-lg';
                        const iframe = document.createElement('iframe');
                        iframe.src = `https://www.youtube.com/embed/${ytId}`;
                        iframe.className = 'w-full h-full'; iframe.frameBorder = '0';
                        iframe.allow = 'autoplay; encrypted-media'; iframe.allowFullscreen = true;
                        div.appendChild(iframe);
                        videosCol.appendChild(div);
                    } else {
                        const vid = document.createElement('video');
                        vid.src = url; vid.controls = true;
                        vid.className = 'max-h-60 rounded-2xl border border-gold-700/30 shadow-lg w-full max-w-lg';
                        videosCol.appendChild(vid);
                    }
                });
                hasMedia = true;
            }
            mediaContainer.classList.toggle('hidden', !hasMedia);
        }

        function selectOption(choice) {
            if (hasAnswered) return;
            currentSelection = choice;
            for (let i = 1; i <= 4; i++) {
                const btn = document.getElementById('opt' + i);
                if (i === choice) { btn.classList.add('selected-opt'); btn.classList.remove('dimmed-opt'); }
                else { btn.classList.remove('selected-opt'); btn.classList.add('dimmed-opt'); }
            }
            document.getElementById('submit-btn').classList.remove('hidden');
        }

        function submitAnswer() {
            if (currentSelection === 0 || hasAnswered) return;
            processAnswer(currentSelection);
        }

        async function processAnswer(choice) {
            if (hasAnswered) return;
            hasAnswered = true;
            stopCountdown();
            document.getElementById('submit-btn').classList.add('hidden');
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

            const elapsedMs = startTime ? Date.now() - startTime : 0;

            // 透過 RPC 提交答案（RLS 保護）
            sbClient.rpc('submit_response', {
                p_player_name: myName,
                p_question_id: currentQ.id,
                p_choice: choice,
                p_response_time_ms: elapsedMs
            }).then();

            if (choice === 0) {
                showFeedback('未作答，已自動提交');
            } else {
                showFeedback('已成功提交！');
            }
        }

        function showFeedback(msg) {
            const fb = document.getElementById('feedback');
            document.getElementById('options-grid').classList.add('hidden');
            fb.innerText = msg;
            fb.classList.remove('hidden');
            fb.className = "text-center p-8 rounded-3xl text-3xl font-black bg-midnight-900/50 text-gold-200 border-2 border-gold-600 block mt-6";
        }

        // ===== 中獎紀錄 =====
        function showWinnersFab() {
            document.getElementById('winners-fab').classList.remove('hidden');
        }

        function hideWinnersFab() {
            document.getElementById('winners-fab').classList.add('hidden');
        }

        async function openWinnersModal() {
            document.getElementById('winners-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            await fetchFrontendWinners();
        }

        function closeWinnersModal() {
            document.getElementById('winners-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        async function fetchFrontendWinners() {
            const container = document.getElementById('winners-modal-content');
            const [{ data: winners }, { data: groups }] = await Promise.all([
                sbClient.from('lottery_winners').select('*, lottery_members(name, group_id), lottery_prizes(name, sort_order, winner_count)').order('drawn_at', { ascending: false }),
                sbClient.from('lottery_groups').select('*').order('id')
            ]);

            if (!winners || winners.length === 0) {
                container.innerHTML = '<div class="text-gold-400/50 text-center py-10">尚無中獎紀錄</div>';
                return;
            }

            const allGroups = groups || [];

            // Group by prize
            const byPrize = {};
            winners.forEach(w => {
                const prizeId = w.prize_id;
                const prizeName = w.lottery_prizes?.name || '未知獎項';
                const sortOrder = w.lottery_prizes?.sort_order ?? 999;
                const key = String(sortOrder).padStart(5, '0') + '_' + prizeId;
                if (!byPrize[key]) byPrize[key] = { name: prizeName, winners: [] };
                byPrize[key].winners.push(w);
            });

            const sortedKeys = Object.keys(byPrize).sort();
            let html = '';
            sortedKeys.forEach(key => {
                const prizeGroup = byPrize[key];
                html += `<div class="bg-midnight-900/60 rounded-2xl border border-gold-700/30 p-5 space-y-3">
                    <h3 class="text-xl font-bold text-gold-200">🎁 ${prizeGroup.name}</h3>
                    <div class="space-y-2">`;

                prizeGroup.winners.forEach(w => {
                    const isGroupWin = w.group_id != null && w.member_id == null;
                    const groupForWin = isGroupWin ? allGroups.find(g => g.id === w.group_id) : null;
                    const displayName = isGroupWin
                        ? (groupForWin?.name || '未知群組')
                        : (w.lottery_members?.name || '未知');
                    const groupObj = isGroupWin ? null : allGroups.find(g => g.id === w.lottery_members?.group_id);
                    const groupName = isGroupWin ? '群組' : (groupObj ? groupObj.name : '');

                    html += `<div class="flex items-center bg-midnight-800/50 border border-gold-800/30 rounded-xl px-4 py-3 space-x-3">
                        <span class="text-gold-400">🏆</span>
                        <span class="text-gold-200 font-bold">${displayName}</span>
                        ${groupName ? `<span class="text-gold-400/50 text-sm">(${groupName})</span>` : ''}
                    </div>`;
                });
                html += '</div></div>';
            });
            container.innerHTML = html;
        }
    </script>
</body>

</html>
